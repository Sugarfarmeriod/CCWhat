schema: spec-driven

context: |
  OpenSpec 文档默认使用简体中文撰写，除非用户明确要求其他语言。
  代码标识符、命令、路径、API 名称、状态枚举和必要英文术语保持原文。
  如果 OpenSpec 模板包含固定英文标题或关键字，可以保留模板结构，但正文说明应以中文为主。

rules:
  proposal:
    - 使用简体中文撰写 proposal.md 的正文内容，保留必要的英文代码标识符和 API 名称。
  design:
    - 使用简体中文撰写 design.md；技术术语可中英混用，但解释、取舍和风险说明应以中文为主。
  specs:
    - 使用简体中文撰写 spec.md；Requirement 和 Scenario 标题也应使用中文，除非引用既有英文名称。
    - 规范关键字 SHALL、MUST、WHEN、THEN、AND 可以按 OpenSpec 格式保留英文。
  tasks:
    - 使用简体中文撰写 tasks.md；checkbox 格式必须保持 `- [ ] X.Y ...` 或 `- [x] X.Y ...`。

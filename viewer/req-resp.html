<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ccwhat · Req/Resp Viewer</title>
<!-- Anti-FOUC: apply theme before first paint -->
<script>
(function(){
  var s = localStorage.getItem('ccwhat-theme');
  var d = s || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', d);
})();
</script>
<style>
/* ── Token system ── */
:root {
  --bg-base:       #ffffff;
  --bg-surface:    #f5f5f7;
  --bg-elevated:   #ffffff;
  --border:        rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text-primary:  #1d1d1f;
  --text-secondary:#6e6e73;
  --text-tertiary: #aeaeb2;
  --accent:        #0071e3;
  --accent-hover:  #0077ed;
  --success:       #30d158;
  --warning:       #ff9f0a;
  --danger:        #ff3b30;
  --font-sans:     -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
  --font-mono:     "SF Mono", ui-monospace, "Cascadia Code", monospace;
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     14px;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --bg-base:       #0d0d0d;
  --bg-surface:    #161616;
  --bg-elevated:   #1e1e1e;
  --border:        rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text-primary:  #f0f0f0;
  --text-secondary:#8a8a8a;
  --text-tertiary: #555555;
  --accent:        #57b5ff;
  --accent-hover:  #7ac4ff;
  --success:       #30d158;
  --warning:       #ff9f0a;
  --danger:        #ff453a;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  transition: background-color 0.25s ease, color 0.2s ease,
              border-color 0.2s ease, box-shadow 0.2s ease;
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}

body {
  font-family: var(--font-sans);
  background: var(--bg-base); color: var(--text-primary);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

/* ── Theme toggle ── */
.theme-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--bg-surface); border: 1px solid var(--border);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-left: 4px;
  transition: background 0.2s, border-color 0.2s, transform 0.25s ease, color 0.15s;
  color: var(--text-secondary);
}
.theme-btn:hover {
  background: var(--bg-elevated);
  border-color: var(--border-strong);
  transform: rotate(22deg) scale(1.08);
  color: var(--text-primary);
}

/* ── Top bar ── */
.topbar {
  background: var(--bg-elevated); border-bottom: 1px solid var(--border);
  padding: 8px 14px; display: flex; align-items: center;
  gap: 8px; flex-shrink: 0; flex-wrap: wrap;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.topbar h1 { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; letter-spacing: -0.01em; }
.adv-wrap { position: relative; }
.adv-btn {
  background: var(--bg-surface); color: var(--text-secondary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 8px; font-size: 12px; cursor: pointer; white-space: nowrap;
  font-family: var(--font-sans); transition: background 0.1s;
}
.adv-btn:hover { color: var(--text-primary); background: var(--bg-base); }
.adv-panel {
  display: none; position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-md);
  padding: 12px 14px; z-index: 100; min-width: 260px;
  box-shadow: var(--shadow-md);
}
.adv-panel.open { display: block; }
.adv-panel label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
.adv-panel .field { width: 100%; }
.field {
  background: var(--bg-surface); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 8px; font-size: 12px; font-family: var(--font-sans);
  transition: border-color 0.15s;
}
.field:focus { outline: none; border-color: var(--accent); }
select.field { cursor: pointer; }
.btn {
  background: var(--bg-surface); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
  font-family: var(--font-sans); transition: background 0.15s;
}
.btn:hover { background: var(--bg-elevated); }
.badge { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.nav-links { margin-left: auto; display: flex; gap: 10px; }
.nav-link { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }

/* ── Stats bar ── */
.stats-bar {
  display: none; background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px; flex-shrink: 0;
  gap: 0;
}
.stats-bar.visible { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 20px; }
.stats-group { display: flex; align-items: center; gap: 12px; }
.stats-group + .stats-group { padding-left: 20px; border-left: 1px solid var(--border); }
.stat-item { display: flex; flex-direction: column; }
.stat-label { font-size: 10px; color: var(--text-tertiary); margin-bottom: 1px; }
.stat-value { font-size: 13px; font-weight: 600; color: var(--text-primary); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.stat-value.accent { color: var(--accent); }
.sparkline-wrap { display: flex; align-items: center; gap: 6px; padding-left: 20px; border-left: 1px solid var(--border); position: relative; }
.sparkline-label { font-size: 10px; color: var(--text-tertiary); white-space: nowrap; }
.spark-tooltip {
  display: none; position: fixed;
  background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  padding: 4px 8px; font-size: 11px; color: var(--text-primary); font-family: var(--font-mono);
  pointer-events: none; white-space: nowrap; z-index: 200;
  box-shadow: var(--shadow-md);
}
.spark-tooltip.show { display: block; }

/* ── Main layout ── */
.main { flex: 1; display: flex; overflow: hidden; }

/* ── Left: record list ── */
.list-panel {
  width: 380px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg-surface);
}
.record-list { flex: 1; overflow-y: auto; }

.record-item {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.record-item:hover { background: var(--bg-elevated); }
.record-item.active { background: color-mix(in srgb, var(--accent) 8%, var(--bg-base)); border-left: 3px solid var(--accent); padding-left: 9px; }

.ri-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
.ri-lineno { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; min-width: 28px; }
.ri-ts { color: var(--text-secondary); }
.ri-method { font-weight: 700; font-size: 10px; padding: 1px 4px; border-radius: 3px; background: color-mix(in srgb, var(--accent) 12%, var(--bg-base)); color: var(--accent); }
.ri-status { font-size: 10px; padding: 1px 4px; border-radius: 3px; background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border); }
.ri-status.ok { background: color-mix(in srgb, var(--success) 12%, transparent); color: var(--success); }
.ri-status.err { background: color-mix(in srgb, var(--danger) 12%, transparent); color: var(--danger); }
.sse-badge { font-size: 10px; padding: 1px 4px; border-radius: 3px; background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
.ri-url { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Right: detail ── */
.detail-panel { flex: 1; overflow-y: auto; padding: 14px; background: var(--bg-base); }
.empty-detail { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 13px; }

/* Section */
.section { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; }

/* Tabbed section */
.tab-section { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; }
.tab-section-hdr {
  background: var(--bg-surface); padding: 0 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.tab-bar { display: flex; gap: 0; overflow-x: auto; }
.tab-btn {
  padding: 8px 12px; font-size: 12px; cursor: pointer;
  color: var(--text-secondary); border-bottom: 2px solid transparent;
  white-space: nowrap; user-select: none; background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font-sans); transition: color 0.15s;
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); font-weight: 500; }
.tab-section-toggle { font-size: 11px; color: var(--accent); cursor: pointer; padding: 7px 0; white-space: nowrap; }
.tab-pane { display: none; padding: 10px 12px; }
.tab-pane.active { display: block; }
.tab-section-body.hidden .tab-pane { display: none; }
.sec-hdr {
  background: var(--bg-surface); padding: 7px 12px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
}
.sec-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.sec-toggle { font-size: 11px; color: var(--accent); }
.sec-body { padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg-elevated); }
.sec-body.hidden { display: none; }

/* Info grid */
.info-grid { display: grid; grid-template-columns: 130px 1fr; gap: 5px 10px; font-size: 12px; }
.ig-k { color: var(--text-secondary); }
.ig-v { color: var(--text-primary); word-break: break-all; font-family: var(--font-mono); font-size: 11px; }

/* Headers table */
.headers-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.headers-table td { padding: 3px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
.headers-table td:first-child { color: var(--accent); width: 220px; word-break: break-all; }
.headers-table td:last-child { color: var(--text-secondary); word-break: break-all; }

/* JSON tree */
.json-tree { font-family: var(--font-mono); font-size: 11px; line-height: 1.7; }
.jt-node { }
.jt-toggle {
  display: inline-block; width: 14px; text-align: center;
  cursor: pointer; color: var(--accent); user-select: none; flex-shrink: 0;
}
.jt-toggle:hover { color: var(--accent-hover); }
.jt-key { color: var(--accent); }
.jt-str { color: color-mix(in srgb, var(--accent) 60%, var(--text-primary)); }
.jt-num { color: var(--warning); }
.jt-bool { color: var(--danger); }
.jt-null { color: var(--danger); }
.jt-punct { color: var(--text-tertiary); }
.jt-summary { color: var(--text-tertiary); font-style: italic; cursor: pointer; }
.jt-summary:hover { color: var(--text-secondary); }
.jt-children {
  margin-left: 16px; border-left: 1px solid var(--border); padding-left: 6px;
  overflow: hidden;
  max-height: 5000px;
  opacity: 1;
  transition: max-height 0.2s ease, opacity 0.18s ease;
}
.jt-children.hidden { max-height: 0; opacity: 0; }
.jt-row { display: flex; align-items: flex-start; }

.raw-block {
  font-family: var(--font-mono);
  font-size: 11px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
  background: var(--bg-surface); border-radius: var(--radius-sm); padding: 8px;
  max-height: 400px; overflow-y: auto;
}
.json-key    { color: var(--accent); }
.json-str    { color: color-mix(in srgb, var(--accent) 60%, var(--text-primary)); }
.json-num    { color: var(--warning); }
.json-bool   { color: var(--danger); }
.json-null   { color: var(--danger); }
.json-punct  { color: var(--text-secondary); }

/* SSE events */
.sse-event {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--text-secondary);
  border-bottom: 1px solid var(--border); padding: 4px 0;
  white-space: pre-wrap; word-break: break-all;
}
.sse-event:last-child { border-bottom: none; }

/* Placeholder / spinner */
.placeholder { color: var(--text-tertiary); font-size: 13px; padding: 20px; text-align: center; }
.spinner {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite; margin: 24px auto; display: block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Markdown rendered */
.md-view { font-size: 12px; line-height: 1.7; color: var(--text-primary); padding: 4px 0; }
.md-view h1,.md-view h2,.md-view h3 { color: var(--text-primary); margin: 8px 0 4px; font-size: 13px; font-weight: 600; }
.md-view p { margin: 4px 0; }
.md-view code { background: var(--bg-surface); border: 1px solid var(--border); padding:1px 4px; border-radius:3px; font-family: var(--font-mono); font-size:11px; }
.md-view pre { background: var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px; margin:6px 0; overflow-x:auto; font-size:11px; font-family: var(--font-mono); }
.md-view ul,.md-view ol { padding-left:18px; margin:4px 0; }
.md-view li { margin:2px 0; }
.md-view strong { color: var(--text-primary); font-weight: 600; }
.md-view em { color: var(--text-secondary); }
/* md toggle switch */
.md-switch {
  display: inline-flex; align-items: center; gap: 5px;
  margin-left: 6px; cursor: pointer; user-select: none;
}
.md-switch-label { font-size: 10px; color: var(--text-tertiary); }
.md-switch-track {
  position: relative; width: 32px; height: 16px;
  background: var(--border-strong); border-radius: 8px;
  transition: background .2s;
}
.md-switch-track.on { background: var(--accent); }
.md-switch-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: #fff; transition: left .2s;
}
.md-switch-track.on .md-switch-thumb { left: 18px; }
.md-switch-right { font-size: 10px; color: var(--text-tertiary); }

/* Tool expand rows */
.tool-row { border-bottom: 1px solid var(--border); }
.tool-row:last-child { border-bottom: none; }
.tool-hdr { display: flex; align-items: center; gap: 6px; padding: 5px 0; cursor: pointer; user-select: none; }
.tool-hdr:hover .tool-name { color: var(--text-primary); }
.tool-arrow { font-size: 9px; color: var(--accent); }
.tool-name { font-size: 11px; color: var(--warning); font-weight: 600; font-family: var(--font-mono); }
.tool-desc { font-size: 11px; color: var(--text-tertiary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tool-detail { padding: 6px 0 8px 14px; display: none; }
.tool-detail.open { display: block; }
.tool-schema { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); white-space: pre-wrap; background: var(--bg-surface); border-radius: var(--radius-sm); padding: 6px; max-height: 200px; overflow-y: auto; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* Messages diff */
.msg-diff-item {
  padding: 6px 8px; border-radius: var(--radius-sm); margin-bottom: 6px;
  border-left: 3px solid var(--border);
}
.msg-diff-item:last-child { margin-bottom: 0; }
.msg-diff-item.role-user { border-left-color: var(--success); }
.msg-diff-item.role-assistant { border-left-color: var(--accent); }
.msg-diff-role {
  font-size: 10px; font-weight: 600; margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .5px;
}
.msg-diff-item.role-user .msg-diff-role { color: var(--success); }
.msg-diff-item.role-assistant .msg-diff-role { color: var(--accent); }
.msg-diff-block { font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
.msg-diff-block:last-child { margin-bottom: 0; }
.msg-diff-type {
  display: inline-block; font-size: 10px; padding: 0 4px;
  border-radius: 3px; background: var(--bg-surface); color: var(--text-secondary); margin-right: 4px; border: 1px solid var(--border);
}

/* Format button (shown on jt-row hover for long strings) */
.fmt-btn {
  opacity: 0; pointer-events: none;
  margin-left: 6px; padding: 0 5px; height: 16px; line-height: 16px;
  font-size: 10px; cursor: pointer;
  background: var(--bg-surface); color: var(--accent);
  border: 1px solid var(--border); border-radius: 3px;
  white-space: nowrap; flex-shrink: 0;
  transition: opacity .1s;
  font-family: var(--font-sans);
}
.jt-row:hover .fmt-btn { opacity: 1; pointer-events: auto; }
.fmt-btn:hover { background: var(--bg-elevated); }

/* Format overlay */
#fmtOverlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 9999;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
#fmtOverlay.open { display: flex; }
.fmt-card {
  background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-lg);
  width: min(90vw, 900px); max-height: 85vh;
  display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-md);
}
.fmt-card-hdr {
  background: var(--bg-surface); padding: 10px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.fmt-card-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.fmt-card-mode {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); margin-left: 8px;
}
.fmt-card-close {
  background: none; border: none; color: var(--text-tertiary); font-size: 16px;
  cursor: pointer; padding: 0 4px; line-height: 1; transition: color 0.15s;
}
.fmt-card-close:hover { color: var(--text-primary); }
.fmt-card-body { flex: 1; overflow-y: auto; padding: 12px 14px; }

/* Source filter chips */
.source-filter-wrap { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.source-chip {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; cursor: pointer;
  user-select: none; border: 1px solid transparent; transition: opacity .1s;
}
.source-chip.off { opacity: .4; }
.source-chip-main { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 30%, transparent); }
.source-chip-agent { background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning); border-color: color-mix(in srgb, var(--warning) 30%, transparent); }
.source-chip-unknown { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
.source-loading { font-size: 11px; color: var(--accent); display: flex; align-items: center; }

/* ── Replay Modal ─────────────────────────────────────────────────────────── */
#replayModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
#replayModal.open { display: flex; }
.replay-modal-card {
  background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-lg);
  width: min(95vw, 1400px); height: min(95vh, 900px);
  display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow-md);
}
.replay-modal-header {
  background: var(--bg-surface); padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.replay-modal-header h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 0; }
.replay-modal-close {
  background: none; border: none; color: var(--text-tertiary); font-size: 20px;
  cursor: pointer; padding: 0 4px; line-height: 1; transition: color 0.15s;
}
.replay-modal-close:hover { color: var(--text-primary); }
.replay-modal-body {
  flex: 1; overflow: auto; padding: 16px;
  background: var(--bg-base);
}
.replay-edit-section {
  display: flex; flex-direction: column; gap: 12px; height: 100%;
}
.replay-textarea {
  flex: 1; width: 100%; min-height: 200px;
  background: var(--bg-surface); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; font-size: 13px; font-family: var(--font-mono);
  resize: none; line-height: 1.6;
}
.replay-textarea:focus { outline: none; border-color: var(--accent); }
.replay-actions {
  display: flex; gap: 10px; justify-content: flex-end; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.replay-btn {
  padding: 8px 16px; font-size: 13px; cursor: pointer;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-family: var(--font-sans); transition: all 0.15s;
}
.replay-btn-primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.replay-btn-primary:hover { background: var(--accent-hover); }
.replay-btn-secondary {
  background: var(--bg-surface); color: var(--text-primary);
}
.replay-btn-secondary:hover { background: var(--bg-elevated); }
.replay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.replay-loading {
  display: flex; align-items: center; gap: 10px;
  padding: 20px; color: var(--text-secondary);
  font-size: 13px;
}
.replay-spinner {
  width: 16px; height: 16px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.replay-diff-section {
  display: flex; flex-direction: column; height: 100%;
}
.replay-diff-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 12px; margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.replay-diff-header h4 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 0; }
.replay-diff-grid {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  gap: 12px; flex: 1; min-height: 0;
}
.replay-diff-cell {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); overflow: hidden;
  display: flex; flex-direction: column;
}
.replay-diff-cell-header {
  background: var(--bg-elevated); padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.replay-diff-cell-header h5 {
  font-size: 12px; font-weight: 600; color: var(--text-primary); margin: 0;
}
.replay-diff-cell-content {
  flex: 1; overflow: auto; padding: 12px;
  font-size: 12px; line-height: 1.6;
}
.replay-diff-cell-content pre {
  margin: 0; white-space: pre-wrap; word-break: break-all;
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-secondary);
}
.replay-btn-sm {
  padding: 4px 10px; font-size: 11px;
}
/* Replay button in record list */
.replay-action-btn {
  font-size: 10px; padding: 2px 8px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 3px; cursor: pointer; margin-left: 6px;
  opacity: 0.9; transition: opacity 0.15s;
}
.replay-action-btn:hover { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <h1>ccwhat · Req/Resp</h1>
  <div class="adv-wrap" id="advWrap">
    <button class="adv-btn" onclick="toggleAdv()">⚙ 高级设置</button>
    <div class="adv-panel" id="advPanel">
      <label>API URL</label>
      <input class="field" id="apiUrl" type="text" value="" placeholder="默认: 当前页面地址">
      <div style="margin-top:8px;display:flex;align-items:center;gap:6px">
        <input type="checkbox" id="filterTitleReq" checked onchange="renderList();renderStats()">
        <label for="filterTitleReq" style="font-size:11px;color:#e1e4e8;cursor:pointer;margin:0">过滤 title 生成请求</label>
      </div>
    </div>
  </div>
  <select class="field" id="sessionSel" style="max-width:280px" onchange="onSessionChange()">
    <option value="">— session —</option>
  </select>
  <select class="field" id="dateSel" style="width:130px" onchange="loadRecords()">
    <option value="">— date —</option>
  </select>
  <div class="source-filter-wrap" id="sourceFilterWrap"></div>
  <input class="field" id="searchBox" placeholder="搜索 message ID 或 URL…" oninput="renderList()" style="width:220px">
  <button class="btn" onclick="init()">刷新</button>
  <span class="badge" id="countBadge"></span>
  <div class="nav-links">
    <a class="nav-link" href="claude-log.html">Claude Log</a>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">☾</button>
</div>

<!-- Format overlay (singleton) -->
<div id="fmtOverlay">
  <div class="fmt-card">
    <div class="fmt-card-hdr">
      <span>
        <span class="fmt-card-title">格式化预览</span>
        <span class="fmt-card-mode" id="fmtMode"></span>
      </span>
      <button class="fmt-card-close" onclick="closeFormatOverlay()">✕</button>
    </div>
    <div class="fmt-card-body" id="fmtBody"></div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main">
  <div class="list-panel">
    <div class="record-list" id="recordList">
      <div class="placeholder">选择 session 和日期后加载</div>
    </div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="empty-detail">← 点击列表项查看详情</div>
  </div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ccwhat-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '☾';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀' : '☾';
})();

let allRecords = [];
let selectedIdx = -1;
// Source filter: set of active sources ('main', agentId, 'unknown'), null = all active
let activeSourceFilters = null;

function toggleAdv() {
  document.getElementById('advPanel').classList.toggle('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('advWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('advPanel').classList.remove('open');
  }
});

function apiBase() {
  return (document.getElementById('apiUrl').value || window.location.origin).replace(/\/$/, '');
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtTs(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleString('zh-CN', {hour12: false}); } catch { return ts; }
}
function trunc(s, n) { s = String(s ?? ''); return s.length > n ? s.slice(0, n) + '…' : s; }

// ── Syntax highlight JSON ──────────────────────────────────────────────────
function syntaxHighlightJson(obj) {
  const json = JSON.stringify(obj, null, 2);
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,
    match => {
      if (/^"/.test(match)) {
        return /:$/.test(match)
          ? `<span class="json-key">${esc(match)}</span>`
          : `<span class="json-str">${esc(match)}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
      if (/^-?\d/.test(match)) return `<span class="json-num">${match}</span>`;
      return `<span class="json-punct">${esc(match)}</span>`;
    }
  );
}

// ── Init ─────────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(location.search);
  // Pre-fill search box from URL query param ?q=
  const urlQ = params.get('q');
  if (urlQ) {
    const sb = document.getElementById('searchBox');
    if (sb) sb.value = urlQ;
  }
  const urlSession = params.get('session');
  const urlDate = params.get('date');

  try {
    const resp = await fetch(`${apiBase()}/api/req-resp/sessions`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const sel = document.getElementById('sessionSel');
    const cur = urlSession || sel.value;
    sel.innerHTML = '<option value="">— session —</option>';
    for (const s of data.sessions || []) {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = trunc(s.id, 36);
      opt.dataset.dates = JSON.stringify(s.dates);
      if (s.id === cur) opt.selected = true;
      sel.appendChild(opt);
    }
    if (cur && sel.value === cur) {
      onSessionChange(urlDate);
    } else if (!cur && data.sessions?.length === 1) {
      sel.value = data.sessions[0].id;
      onSessionChange();
    }
  } catch(e) {
    document.getElementById('recordList').innerHTML =
      `<div class="placeholder" style="color:#f85149">连接失败: ${esc(e.message)}</div>`;
  }
}

// ── Session change ─────────────────────────────────────────────────────────
function onSessionChange(restoreDate) {
  const sel = document.getElementById('sessionSel');
  const opt = sel.options[sel.selectedIndex];
  const dateSel = document.getElementById('dateSel');
  dateSel.innerHTML = '<option value="">— date —</option>';

  if (opt && opt.dataset.dates) {
    const dates = JSON.parse(opt.dataset.dates);
    for (const d of dates) {
      const o = document.createElement('option');
      o.value = d; o.textContent = d;
      dateSel.appendChild(o);
    }
    if (restoreDate && dates.includes(restoreDate)) {
      dateSel.value = restoreDate;
      loadRecords();
      return;
    }
    // Auto-select latest date
    if (dates.length > 0) {
      dateSel.value = dates[dates.length - 1];
      loadRecords();
    }
  }
}

// ── Load records ──────────────────────────────────────────────────────────
async function loadRecords() {
  const session = document.getElementById('sessionSel').value;
  const date = document.getElementById('dateSel').value;
  if (!session || !date) return;

  document.getElementById('recordList').innerHTML = '<span class="spinner"></span>';
  document.querySelectorAll('.spark-tooltip').forEach(el => el.remove());

  try {
    const resp = await fetch(
      `${apiBase()}/api/req-resp/records?session=${encodeURIComponent(session)}&date=${encodeURIComponent(date)}`
    );
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allRecords = data.records || [];
    selectedIdx = -1;
    activeSourceFilters = null;
    document.getElementById('recordList').innerHTML = '<span class="spinner"></span>';
    document.getElementById('detailPanel').innerHTML = '<div class="empty-detail">← 点击列表项查看详情</div>';
    // Wait for source resolution before rendering list
    await fetchAllSources(session);
  } catch(e) {
    document.getElementById('recordList').innerHTML =
      `<div class="placeholder" style="color:#f85149">加载失败: ${esc(e.message)}</div>`;
  }
}

// ── Stats bar ─────────────────────────────────────────────────────────────
function fmtN(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const filterTitle = document.getElementById('filterTitleReq')?.checked ?? true;
  const ssRecs = allRecords.filter(r => {
    if (!r.is_sse || !r.sse_events?.length) return false;
    if (filterTitle && isTitleGenReq(r)) return false;
    if (activeSourceFilters !== null) {
      const src = r._source ?? 'unknown';
      if (activeSourceFilters !== src) return false;
    }
    return true;
  });
  if (!ssRecs.length) { bar.className = 'stats-bar'; bar.innerHTML = ''; return; }

  let totalOutput = 0, totalInput = 0, totalCacheRead = 0, totalCacheCreate = 0;
  const totalInPerReq = [];  // [{v, line}]

  for (const r of ssRecs) {
    const { usage } = parseSseEvents(r.sse_events);
    const line = r._fileLine ?? null;
    if (!usage) { totalInPerReq.push({ v: 0, line }); continue; }
    const out = usage.output_tokens || 0;
    const totalIn = (usage.input_tokens || 0) + (usage.cache_read_input_tokens || 0) + (usage.cache_creation_input_tokens || 0);
    totalOutput    += out;
    totalInput     += usage.input_tokens || 0;
    totalCacheRead += usage.cache_read_input_tokens || 0;
    totalCacheCreate += usage.cache_creation_input_tokens || 0;
    totalInPerReq.push({ v: totalIn, line });
  }

  const n = totalInPerReq.length;

  bar.className = 'stats-bar visible';
  bar.innerHTML =
    `<div class="stats-group">` +
      `<div class="stat-item"><span class="stat-label">请求数</span><span class="stat-value accent">${ssRecs.length}</span></div>` +
    `</div>` +
    `<div class="stats-group">` +
      `<div class="stat-item"><span class="stat-label">output</span><span class="stat-value">${fmtN(totalOutput)}</span></div>` +
      `<div class="stat-item"><span class="stat-label">input</span><span class="stat-value">${fmtN(totalInput)}</span></div>` +
    `</div>` +
    `<div class="stats-group">` +
      `<div class="stat-item"><span class="stat-label">cache_read</span><span class="stat-value">${fmtN(totalCacheRead)}</span></div>` +
      `<div class="stat-item"><span class="stat-label">cache_create</span><span class="stat-value">${fmtN(totalCacheCreate)}</span></div>` +
    `</div>`;

  // Sparkline — built as DOM for interactivity
  if (n >= 2) {
    const W = 160, H = 32, pad = 2;
    const max = Math.max(...totalInPerReq.map(d => d.v), 1);
    const coords = totalInPerReq.map((d, i) => ({
      x: pad + (i / (n - 1)) * (W - pad * 2),
      y: H - pad - (d.v / max) * (H - pad * 2),
      v: d.v,
      line: d.line,
    }));

    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('width', W); svg.setAttribute('height', H);
    svg.style.display = 'block'; svg.style.cursor = 'crosshair';

    const poly = document.createElementNS(NS, 'polyline');
    poly.setAttribute('points', coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' '));
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', '#58a6ff');
    poly.setAttribute('stroke-width', '1.5');
    poly.setAttribute('stroke-linejoin', 'round');
    poly.setAttribute('stroke-linecap', 'round');
    svg.appendChild(poly);

    // Hover dot
    const dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('r', '3'); dot.setAttribute('fill', '#58a6ff');
    dot.style.display = 'none';
    svg.appendChild(dot);

    // Tooltip div
    const tip = document.createElement('div');
    tip.className = 'spark-tooltip';
    document.body.appendChild(tip);

    // Hit areas per data point
    const slotW = (W - pad * 2) / n;
    coords.forEach((c, i) => {
      const hit = document.createElementNS(NS, 'rect');
      hit.setAttribute('x', (c.x - slotW / 2).toFixed(1));
      hit.setAttribute('y', '0');
      hit.setAttribute('width', slotW.toFixed(1));
      hit.setAttribute('height', H);
      hit.setAttribute('fill', 'transparent');
      hit.addEventListener('mouseenter', ev => {
        dot.setAttribute('cx', c.x.toFixed(1));
        dot.setAttribute('cy', c.y.toFixed(1));
        dot.style.display = '';
        tip.textContent = `${c.line != null ? 'L' + c.line : '#' + (i + 1)}  总输入: ${c.v.toLocaleString()}`;
        tip.classList.add('show');
      });
      hit.addEventListener('mousemove', ev => {
        tip.style.left = (ev.clientX + 12) + 'px';
        tip.style.top  = (ev.clientY - 28) + 'px';
      });
      hit.addEventListener('mouseleave', () => {
        dot.style.display = 'none';
        tip.classList.remove('show');
      });
      svg.appendChild(hit);
    });

    // Clean up tooltip when bar is re-rendered
    svg.addEventListener('remove', () => tip.remove());

    const wrap = document.createElement('div');
    wrap.className = 'sparkline-wrap';
    const label = document.createElement('span');
    label.className = 'sparkline-label';
    label.textContent = '总输入/req';
    wrap.appendChild(label);
    wrap.appendChild(svg);
    bar.appendChild(wrap);
  }
}

// ── Title generation request filter ──────────────────────────────────────
// ── Source filter ──────────────────────────────────────────────────────────
async function fetchAllSources(sessionId) {
  const wrap = document.getElementById('sourceFilterWrap');
  if (!wrap) return;
  wrap.innerHTML = '<span class="source-loading"><span class="spinner" style="width:10px;height:10px;border-width:1.5px;display:inline-block;vertical-align:middle;margin-right:4px"></span>来源查询中…</span>';
  document.getElementById('recordList').innerHTML = '<span class="spinner"></span>';

  const sseRecs = allRecords.map((r, i) => ({ r, i })).filter(({ r }) => r.is_sse && r._message_id);
  await Promise.all(sseRecs.map(async ({ r }) => {
    try {
      const res = await fetch(`${apiBase()}/api/message-source/${encodeURIComponent(sessionId)}/${encodeURIComponent(r._message_id)}`);
      if (!res.ok) return;
      const data = await res.json();
      if (data.source === 'main') r._source = 'main';
      else if (data.source === 'subagent') r._source = data.agentId || 'unknown-agent';
    } catch {}
  }));

  renderSourceFilter();
  renderList();
  renderStats();
}

function renderSourceFilter() {
  const wrap = document.getElementById('sourceFilterWrap');
  if (!wrap) return;

  // Collect distinct sources from SSE records
  const sourceSet = new Map(); // source -> count
  for (const r of allRecords) {
    if (!r.is_sse) continue;
    const src = r._source ?? null;
    if (src === null) continue;
    sourceSet.set(src, (sourceSet.get(src) || 0) + 1);
  }

  if (sourceSet.size === 0) { wrap.innerHTML = ''; return; }

  // Init filter state: default to main only (null = all)
  if (activeSourceFilters === null) {
    activeSourceFilters = sourceSet.has('main') ? 'main' : null;
  }

  const totalCount = [...sourceSet.values()].reduce((a, b) => a + b, 0);

  wrap.innerHTML = '';

  function refreshChips() {
    wrap.querySelectorAll('.source-chip').forEach(c => {
      const s = c.dataset.src;
      const active = s === '__all__' ? activeSourceFilters === null : activeSourceFilters === s;
      c.classList.toggle('off', !active);
    });
  }

  // 全部 chip
  const allChip = document.createElement('span');
  allChip.className = `source-chip source-chip-unknown` + (activeSourceFilters === null ? '' : ' off');
  allChip.textContent = `全部 (${totalCount})`;
  allChip.dataset.src = '__all__';
  allChip.onclick = () => {
    activeSourceFilters = null;
    refreshChips();
    renderList(); renderStats();
  };
  wrap.appendChild(allChip);

  const sorted = [...sourceSet.entries()].sort(([a], [b]) => {
    if (a === 'main') return -1;
    if (b === 'main') return 1;
    return a.localeCompare(b);
  });
  for (const [src, count] of sorted) {
    const chip = document.createElement('span');
    const isMain = src === 'main';
    chip.className = `source-chip ${isMain ? 'source-chip-main' : 'source-chip-agent'}` + (activeSourceFilters === src ? '' : ' off');
    chip.textContent = `${isMain ? '🤖 Main' : '🔧 ' + src} (${count})`;
    chip.dataset.src = src;
    chip.title = src;
    chip.onclick = () => {
      activeSourceFilters = src;
      refreshChips();
      renderList(); renderStats();
    };
    wrap.appendChild(chip);
  }
}

function isTitleGenReq(r) {
  try {
    const body = JSON.parse(r.request?.body || '{}');
    const system = body.system;
    if (!Array.isArray(system)) return false;
    return system.some(s =>
      s.type === 'text' &&
      typeof s.text === 'string' &&
      s.text.startsWith('Generate a concise, sentence-case title')
    );
  } catch { return false; }
}

// ── Render list ────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('recordList');
  const q = (document.getElementById('searchBox')?.value || '').trim().toLowerCase();

  const filterTitle = document.getElementById('filterTitleReq')?.checked ?? true;
  const visible = allRecords.map((r, i) => ({ r, i })).filter(({ r }) => {
    if (filterTitle && isTitleGenReq(r)) return false;
    if (activeSourceFilters !== null) {
      const src = r._source ?? 'unknown';
      if (activeSourceFilters !== src) return false;
    }
    if (!q) return true;
    const msgId = (r._message_id || '').toLowerCase();
    const url = (r.url || '').toLowerCase();
    return msgId.includes(q) || url.includes(q);
  });

  document.getElementById('countBadge').textContent =
    q ? `${visible.length} / ${allRecords.length} 条` : `${allRecords.length} 条`;

  if (allRecords.length === 0) {
    list.innerHTML = '<div class="placeholder">无记录</div>';
    return;
  }
  if (visible.length === 0) {
    list.innerHTML = '<div class="placeholder">无匹配记录</div>';
    return;
  }

  list.innerHTML = '';
  visible.forEach(({ r, i }) => {
    const el = document.createElement('div');
    el.className = 'record-item' + (i === selectedIdx ? ' active' : '');
    el.dataset.idx = i;

    const status = r.response?.status || 0;
    const statusCls = status >= 200 && status < 300 ? 'ok' : status >= 400 ? 'err' : '';
    const isSSE = r.is_sse;

    let urlDisplay = r.url || '';
    try { urlDisplay = new URL(r.url).pathname; } catch {}

    let totalInTokens = '', outTokens = '';
    if (isSSE && r.sse_events?.length) {
      const { usage } = parseSseEvents(r.sse_events);
      if (usage) {
        const v = (usage.input_tokens || 0) + (usage.cache_read_input_tokens || 0) + (usage.cache_creation_input_tokens || 0);
        if (v > 0) totalInTokens = fmtN(v);
        const o = usage.output_tokens || 0;
        if (o > 0) outTokens = fmtN(o);
      }
    }

    const cacheKey = getRecordCacheKey(r, i);
    const isRunning = isReplayRunning && runningReplayKey === cacheKey;
    el.innerHTML =
      `<div class="ri-row1">` +
        `<span class="ri-lineno">#${i + 1}</span>` +
        `<span class="ri-ts">${esc(fmtTs(r.timestamp))}</span>` +
        `<span class="ri-method">${esc(r.method || '')}</span>` +
        `<span class="ri-status ${statusCls}">${status}</span>` +
        (isSSE ? `<span class="sse-badge">SSE</span>` : '') +
        (isSSE ? `<button class="replay-action-btn" data-idx="${i}" ${isRunning ? 'disabled' : ''}>${isRunning ? '⏳' : '▶'} 回放</button>` : '') +
        (totalInTokens || outTokens
          ? `<span style="font-size:10px;color:#6e7681;margin-left:auto;font-family:monospace;display:flex;gap:6px">` +
            (totalInTokens ? `<span title="总输入 tokens">in:${totalInTokens}</span>` : '') +
            (outTokens ? `<span title="output tokens">out:${outTokens}</span>` : '') +
            `</span>`
          : '') +
      `</div>` +
      `<div class="ri-url">${esc(urlDisplay)}</div>`;

    el.onclick = (e) => {
      if (e.target.classList.contains('replay-action-btn')) {
        e.stopPropagation();
        const record = allRecords[i];
        const reqJson = JSON.parse(record.request?.body || '{}');
        const userMsg = findReplayTargetMessage(reqJson.messages || []);
        openReplayModal(record, i, reqJson, userMsg);
      } else {
        selectRecord(i);
      }
    };
    list.appendChild(el);
  });
}

// ── Select record ─────────────────────────────────────────────────────────
function selectRecord(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.record-item').forEach(el =>
    el.classList.toggle('active', Number(el.dataset.idx) === idx));
  renderDetail(allRecords[idx], idx);
  // Async: fetch message source and update badge
  const r = allRecords[idx];
  const msgId = r._message_id;
  const sessionId = document.getElementById('sessionSel').value;
  if (msgId && sessionId) {
    fetch(`${apiBase()}/api/message-source/${encodeURIComponent(sessionId)}/${encodeURIComponent(msgId)}`)
      .then(res => res.ok ? res.json() : null)
      .then(data => {
        if (!data || !data.source) return;
        const badge = document.getElementById('msgSourceBadge');
        if (!badge) return;
        if (data.source === 'main') {
          badge.textContent = '🤖 Main Session';
          badge.style.background = '#1a2440'; badge.style.color = '#79c0ff';
        } else {
          badge.textContent = `🔧 Agent: ${data.agentId || 'unknown'}`;
          badge.style.background = '#2d1f3a'; badge.style.color = '#bc8cff';
        }
        badge.style.display = 'inline-block';
        const hint = badge.nextElementSibling;
        if (hint) hint.style.display = 'none';
      })
      .catch(() => {});

}

// ── Minimal markdown renderer ─────────────────────────────────────────────
function renderMarkdown(text) {
  // Escape HTML first, then apply markdown patterns
  let s = String(text ?? '');
  // Code fences
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) => `<pre>${escRaw(code)}</pre>`);
  // Inline code
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${escRaw(c)}</code>`);
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Unordered list items
  s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  // Line breaks → paragraphs
  s = s.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<')) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');
  return s;
}
function escRaw(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── JSON tree renderer (collapsible, default 3 levels open) ───────────────
function renderJsonTree(value, depth, maxOpen) {
  const el = document.createElement('div');
  el.className = 'jt-node';

  if (value === null) {
    el.innerHTML = `<span class="jt-null">null</span>`;
    return el;
  }
  if (typeof value === 'boolean') {
    el.innerHTML = `<span class="jt-bool">${value}</span>`;
    return el;
  }
  if (typeof value === 'number') {
    el.innerHTML = `<span class="jt-num">${esc(String(value))}</span>`;
    return el;
  }
  if (typeof value === 'string') {
    const row = document.createElement('div');
    row.className = 'jt-row';
    const strSpan = document.createElement('span');
    strSpan.className = 'jt-str';
    strSpan.textContent = JSON.stringify(value);
    row.appendChild(strSpan);
    if (value.length >= FMT_MIN_LEN) {
      const btn = document.createElement('button');
      btn.className = 'fmt-btn';
      btn.textContent = '格式化';
      btn.onclick = e => { e.stopPropagation(); showFormatOverlay(value); };
      row.appendChild(btn);
    }
    el.appendChild(row);
    return el;
  }

  const isArray = Array.isArray(value);
  const entries = isArray ? value.map((v, i) => [i, v]) : Object.entries(value);
  const openBrace = isArray ? '[' : '{';
  const closeBrace = isArray ? ']' : '}';

  if (entries.length === 0) {
    el.innerHTML = `<span class="jt-punct">${openBrace}${closeBrace}</span>`;
    return el;
  }

  const collapsed = depth >= maxOpen;
  const summary = isArray
    ? `Array(${entries.length})`
    : `{${entries.slice(0, 3).map(([k]) => k).join(', ')}${entries.length > 3 ? '…' : ''}}`;

  // Row: toggle + open brace + (if collapsed) summary
  const row = document.createElement('div');
  row.className = 'jt-row';

  const toggle = document.createElement('span');
  toggle.className = 'jt-toggle';
  toggle.textContent = collapsed ? '▶' : '▼';

  const braceOpen = document.createElement('span');
  braceOpen.className = 'jt-punct';
  braceOpen.textContent = openBrace;

  const summaryEl = document.createElement('span');
  summaryEl.className = 'jt-summary';
  summaryEl.textContent = ` ${summary} `;
  if (!collapsed) summaryEl.style.display = 'none';

  row.appendChild(toggle);
  row.appendChild(braceOpen);
  row.appendChild(summaryEl);
  el.appendChild(row);

  // Children container
  const children = document.createElement('div');
  children.className = 'jt-children' + (collapsed ? ' hidden' : '');

  for (let idx = 0; idx < entries.length; idx++) {
    const [key, val] = entries[idx];
    const childRow = document.createElement('div');
    childRow.className = 'jt-row';

    const keyEl = document.createElement('span');
    if (!isArray) {
      keyEl.innerHTML = `<span class="jt-key">${esc(JSON.stringify(key))}</span><span class="jt-punct">: </span>`;
    }

    const childNode = renderJsonTree(val, depth + 1, maxOpen);

    // Trailing comma
    const comma = document.createElement('span');
    comma.className = 'jt-punct';
    comma.textContent = idx < entries.length - 1 ? ',' : '';

    const childWrap = document.createElement('div');
    childWrap.style.cssText = 'display:flex;align-items:flex-start;width:100%';
    if (!isArray) childWrap.appendChild(keyEl);
    childWrap.appendChild(childNode);
    childWrap.appendChild(comma);
    children.appendChild(childWrap);
  }

  // Close brace
  const braceClose = document.createElement('div');
  braceClose.innerHTML = `<span class="jt-punct">${closeBrace}</span>`;
  el.appendChild(children);
  el.appendChild(braceClose);

  // Toggle click
  toggle.onclick = () => {
    const isHidden = children.classList.toggle('hidden');
    toggle.textContent = isHidden ? '▶' : '▼';
    summaryEl.style.display = isHidden ? '' : 'none';
  };
  summaryEl.onclick = toggle.onclick;

  return el;
}

// ── Build per-event annotation (parsed summary shown under each raw event) ──
function buildSseEventAnnotations(events, parsed) {
  // Returns { eventIndex: htmlString }
  const annotations = {};

  // Track accumulated text/json per block index during replay
  const blockText = {};   // index -> accumulated text
  const blockJson = {};   // index -> accumulated partial_json
  const blockMeta = {};   // index -> {type, name, id}

  events.forEach((ev, evIdx) => {
    for (const line of ev.split('\n')) {
      if (!line.startsWith('data:')) continue;
      const raw = line.slice(5).trim();
      if (raw === '[DONE]') continue;
      let d; try { d = JSON.parse(raw); } catch { continue; }
      const type = d.type;

      if (type === 'content_block_start') {
        const idx = d.index;
        const cb = d.content_block || {};
        blockMeta[idx] = { type: cb.type, name: cb.name, id: cb.id };
        blockText[idx] = '';
        blockJson[idx] = '';
        const badge = cb.type === 'text'
          ? `<span style="color:#56d364;font-weight:600">text</span>`
          : `<span style="color:#79c0ff;font-weight:600">tool_use</span>`;
        annotations[evIdx] = `▸ block[${idx}] ${badge}${cb.name ? ` <span style="color:#e3b341">${esc(cb.name)}</span>` : ''}${cb.id ? ` <span style="color:#484f58;font-family:monospace">${esc(cb.id)}</span>` : ''}`;

      } else if (type === 'content_block_delta') {
        const idx = d.index;
        const delta = d.delta || {};
        const meta = blockMeta[idx] || {};
        if (delta.type === 'text_delta' && delta.text) {
          blockText[idx] = (blockText[idx] || '') + delta.text;
          const preview = blockText[idx].slice(-60);
          annotations[evIdx] = `▸ block[${idx}] text: <span style="color:#adbac7">…${esc(preview)}</span>`;
        } else if (delta.type === 'input_json_delta' && delta.partial_json) {
          blockJson[idx] = (blockJson[idx] || '') + delta.partial_json;
          const preview = blockJson[idx].slice(-60);
          annotations[evIdx] = `▸ block[${idx}] <span style="color:#e3b341">${esc(meta.name || 'tool_use')}</span> input: <span style="color:#adbac7">…${esc(preview)}</span>`;
        }
      } else if (type === 'content_block_stop') {
        const idx = d.index;
        annotations[evIdx] = `▸ block[${idx}] stop`;
      } else if (type === 'message_start') {
        const u = d.message?.usage;
        annotations[evIdx] = u ? `▸ message_start usage: in=${u.input_tokens} out=${u.output_tokens}` : '▸ message_start';
      } else if (type === 'message_delta') {
        const sr = d.delta?.stop_reason;
        const u = d.usage;
        annotations[evIdx] = `▸ message_delta` +
          (sr ? ` stop_reason=<b style="color:#e1e4e8">${esc(sr)}</b>` : '') +
          (u ? ` out=${u.output_tokens} cache_read=${u.cache_read_input_tokens}` : '');
      } else if (type === 'message_stop') {
        annotations[evIdx] = '▸ message_stop';
      } else if (type === 'ping') {
        annotations[evIdx] = '▸ ping';
      }
    }
  });
  return annotations;
}

// ── Parse SSE events ──────────────────────────────────────────────────────
function parseSseEvents(events) {
  // blocks: index -> {type, name, id, text, inputJson}
  const blocks = {};
  let stopReason = null;
  let usage = null;
  // OpenAI format accumulator (single text block)
  let openaiText = '';
  let hasOpenAiFormat = false;

  for (const ev of events) {
    for (const line of ev.split('\n')) {
      if (!line.startsWith('data:')) continue;
      const raw = line.slice(5).trim();
      if (raw === '[DONE]') continue;
      let d;
      try { d = JSON.parse(raw); } catch { continue; }

      // Claude API format
      const type = d.type;
      if (type === 'content_block_start') {
        const idx = d.index;
        const cb = d.content_block || {};
        blocks[idx] = { type: cb.type || 'unknown', name: cb.name || null, id: cb.id || null, text: '', inputJson: '' };
      } else if (type === 'content_block_delta') {
        const idx = d.index;
        const delta = d.delta || {};
        if (!blocks[idx]) blocks[idx] = { type: 'unknown', name: null, id: null, text: '', inputJson: '' };
        if (delta.type === 'text_delta' && delta.text) {
          blocks[idx].text += delta.text;
        } else if (delta.type === 'input_json_delta' && delta.partial_json) {
          blocks[idx].inputJson += delta.partial_json;
        }
      } else if (type === 'message_delta') {
        if (d.delta?.stop_reason) stopReason = d.delta.stop_reason;
        if (d.usage) usage = { ...usage, ...d.usage };
      } else if (type === 'message_start') {
        if (d.message?.usage) usage = { ...d.message.usage, ...usage };
      }
      // OpenAI compatible format (OpenCode, etc.)
      else if (d.object === 'chat.completion.chunk') {
        hasOpenAiFormat = true;
        const choice = d.choices?.[0];
        if (choice) {
          const delta = choice.delta || {};
          // Accumulate content or reasoning_content
          const content = delta.content;
          const reasoning = delta.reasoning_content;
          if (content) openaiText += content;
          if (reasoning) openaiText += reasoning;
          // Check finish reason
          if (choice.finish_reason) {
            stopReason = choice.finish_reason;
          }
        }
        if (d.usage) {
          usage = { ...usage, ...d.usage };
        }
      }
    }
  }

  // If OpenAI format was detected, create a single text block
  if (hasOpenAiFormat && openaiText) {
    blocks[0] = { type: 'text', name: null, id: null, text: openaiText, inputJson: '' };
  }

  // Build contents array in index order
  const contents = Object.entries(blocks)
    .sort(([a], [b]) => Number(a) - Number(b))
    .map(([, b]) => {
      const item = { type: b.type };
      if (b.name) item.name = b.name;
      if (b.id) item.id = b.id;
      if (b.type === 'text') {
        item.text = b.text;
      } else if (b.type === 'tool_use') {
        item.text = b.text;
        try { item.input = JSON.parse(b.inputJson); } catch { item.input = b.inputJson; }
      }
      return item;
    });

  return { contents, stopReason, usage };
}

// ── Messages diff ──────────────────────────────────────────────────────────
function getPrevRecord(idx) {
  // Find previous SSE record that's not a context reset (messages count not drastically lower)
  for (let i = idx - 1; i >= 0; i--) {
    const r = allRecords[i];
    if (!r.is_sse) continue;
    if (isTitleGenReq(r)) continue;
    return r;
  }
  return null;
}

function parseMsgs(r) {
  try { return JSON.parse(r.request?.body || '{}').messages || []; }
  catch { return []; }
}

function diffMessages(curMsgs, prevMsgs) {
  // Returns {added: [...], removed: N}
  if (!prevMsgs.length) return { added: curMsgs, removed: 0 };
  const delta = curMsgs.length - prevMsgs.length;
  if (delta > 0) return { added: curMsgs.slice(-delta), removed: 0 };
  if (delta < 0) return { added: [], removed: -delta };
  return { added: [], removed: 0 };
}

function renderMsgBlock(b, blockIdx) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-diff-block';

  // Header: [index] type-badge name id
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:6px';
  const idxSpan = `<span style="font-size:10px;color:#484f58;font-family:monospace">[${blockIdx}]</span>`;
  const typeBadge = b.type === 'text'
    ? `<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;background:#1a2e1a;color:#56d364">text</span>`
    : b.type === 'tool_use'
      ? `<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;background:#1a2440;color:#79c0ff">tool_use</span>`
      : b.type === 'tool_result'
        ? `<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;background:#1a2e1a;color:#56d364">tool_result</span>`
        : `<span style="font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;background:#21262d;color:#8b949e">${esc(b.type)}</span>`;
  hdr.innerHTML = idxSpan + typeBadge +
    (b.name ? `<span style="font-size:11px;color:#e3b341">${esc(b.name)}</span>` : '') +
    (b.tool_use_id ? `<span style="font-size:10px;color:#484f58;font-family:monospace">${esc(b.tool_use_id)}</span>` : '') +
    (b.id ? `<span style="font-size:10px;color:#484f58;font-family:monospace">${esc(b.id)}</span>` : '');
  wrap.appendChild(hdr);

  if (b.type === 'text' && b.text) {
    wrap.appendChild(mkTextWithMdToggle(b.text));
  } else if (b.type === 'tool_use' && b.input != null) {
    const tree = document.createElement('div');
    tree.className = 'json-tree';
    tree.style.cssText = 'max-height:200px;overflow-y:auto;padding:4px;background:#0d1117;border-radius:4px';
    tree.appendChild(typeof b.input === 'object'
      ? renderJsonTree(b.input, 0, 2)
      : (() => { const d = document.createElement('div'); d.textContent = String(b.input); return d; })());
    wrap.appendChild(tree);
  } else if (b.type === 'tool_result') {
    const content = typeof b.content === 'string' ? b.content : JSON.stringify(b.content, null, 2);
    wrap.appendChild(mkTextWithMdToggle(content));
  }

  return wrap;
}


function renderDetail(r, idx) {

  const req = r.request || {};
  const resp = r.response || {};
  const reqHeaders = req.headers || {};
  const respHeaders = resp.headers || {};

  // 1. Overview
  panel.appendChild(mkSection('概览', body => {
    body.innerHTML = `<div class="info-grid">
      <div class="ig-k">时间</div><div class="ig-v">${esc(fmtTs(r.timestamp))}</div>
      <div class="ig-k">方法 / 状态</div><div class="ig-v">${esc(r.method || '')} ${resp.status || ''}</div>
      <div class="ig-k">URL</div><div class="ig-v">${esc(r.url || '')}</div>
      <div class="ig-k">Domain</div><div class="ig-v">${esc(r.domain || '')}</div>
      <div class="ig-k">SSE</div><div class="ig-v">${r.is_sse ? `是（${r.sse_events?.length || 0} events）` : '否'}</div>
      ${traceId ? `<div class="ig-k">M-TraceId</div><div class="ig-v">${esc(traceId)}</div>` : ''}
      ${r._message_id ? `<div class="ig-k">来源</div><div class="ig-v"><span id="msgSourceBadge" style="display:none;font-size:11px;padding:1px 7px;border-radius:4px;font-weight:600"></span><span style="font-size:11px;color:#484f58"> 查询中…</span></div>` : ''}
    </div>`;
  }));

  // 2. Request headers
  panel.appendChild(mkSection(`请求 Headers（${Object.keys(reqHeaders).length}）`, body => {
    const tbl = document.createElement('table');
    tbl.className = 'headers-table';
    for (const [k, v] of Object.entries(reqHeaders)) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${esc(k)}</td><td>${esc(v)}</td>`;
      tbl.appendChild(tr);
    }
    body.appendChild(tbl);
  }, true));

  // 3. Request body — parsed sections + raw JSON tree
  const reqBody = req.body || '';
  if (reqBody) {
    let reqJson = null;
    try { reqJson = JSON.parse(reqBody); } catch {}

    if (reqJson) {
      const msgs = reqJson.messages || [];
      const lastMsg = msgs[msgs.length - 1];
      const sysBlocks = reqJson.system || [];
      const tools = reqJson.tools || [];

      // Compute diff label
      const _prev = idx != null ? getPrevRecord(idx) : null;
      const _prevMsgs = _prev ? parseMsgs(_prev) : [];
      const _diff = diffMessages(msgs, _prevMsgs);
      const diffLabel = _diff.removed > 0
        ? `增量 (+${_diff.added.length} -${_diff.removed})`
        : `增量 (+${_diff.added.length})`;

      // Build tabs: Message | System | Tools | 增量 | 原始
      const tabs = [
        { id: 'msg',  label: `Message (${msgs.length})` },
        { id: 'sys',  label: `System (${sysBlocks.length})` },
        { id: 'tool', label: `Tools (${tools.length})` },
        { id: 'diff', label: diffLabel },
        { id: 'raw',  label: '原始' },
      ];

      const tabSec = document.createElement('div');
      tabSec.className = 'tab-section';

      // Header with tab bar + collapse toggle
      const tabHdr = document.createElement('div');
      tabHdr.className = 'tab-section-hdr';
      const tabBar = document.createElement('div');
      tabBar.className = 'tab-bar';
      tabs.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.textContent = t.label;
        btn.dataset.tab = t.id;
        btn.onclick = () => {
          tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

// ── Replay functions ───────────────────────────────────────────────────────
let isReplayRunning = false;
let runningReplayKey = null;
let currentModalRecord = null;
let currentModalRecordKey = null;
let currentModalRecordIdx = null;

function setReplayRunning(running, cacheKey) {
  isReplayRunning = running;
  runningReplayKey = running ? cacheKey : null;
  renderList();
}

function getRecordCacheKey(record, idx) {
  if (record._message_id) return `msg:${record._message_id}`;
  if (record._fileLine) return `line:${record._fileLine}`;
  return `idx:${idx}`;
}

async function openReplayModal(record, recordIdx, reqJson, userMsg) {
  currentModalRecord = record;
  currentModalRecordIdx = recordIdx;
  currentModalRecordKey = getRecordCacheKey(record, recordIdx);
  try {
    const statusUrl = `${apiBase()}/api/replay/status?recordKey=${encodeURIComponent(currentModalRecordKey)}`;
    const statusResp = await fetch(statusUrl);
    const statusData = await statusResp.json();
    if (statusData.ok && statusData.hasReplay && statusData.result) {
      renderReplayDiffView(statusData);
    } else {
      renderReplayEditView(record, reqJson, userMsg);
    }
    document.getElementById('replayModal').classList.add('open');
  } catch (err) {
    alert('打开回放弹窗失败: ' + err.message);
  }
}

function closeReplayModal() {
  document.getElementById('replayModal').classList.remove('open');
  currentModalRecord = null;
  currentModalRecordKey = null;
  currentModalRecordIdx = null;
}

function renderReplayEditView(record, reqJson, userMsg) {
  const modalBody = document.getElementById('replayModalBody');
  const msgs = reqJson.messages || [];
  const replayMsg = userMsg || findReplayTargetMessage(msgs);
  const editText = extractReplayTargetText(replayMsg);
  const msgTypeHint = replayMsg ? `[${replayMsg.role}${replayMsg.name ? ': ' + replayMsg.name : ''}]` : '';
  modalBody.innerHTML = `
    <div class="replay-edit-section">
      <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">编辑消息内容 ${esc(msgTypeHint)}</div>
      <textarea id="replayModalTextarea" class="replay-textarea" placeholder="输入消息内容...">${esc(editText)}</textarea>
      <div class="replay-actions">
        <button class="replay-btn replay-btn-secondary" onclick="sendReplayFromModal(true)">原文不改，直接回放</button>
        <button class="replay-btn replay-btn-primary" onclick="sendReplayFromModal(false)">发送改写版本</button>
      </div>
    </div>
    <div id="replayModalResult" style="flex:1;overflow:auto;"></div>
  `;
}

function renderReplayDiffView(statusData) {
  const modalBody = document.getElementById('replayModalBody');
  const originalReqJson = currentModalRecord?.request?.body ? JSON.parse(currentModalRecord.request.body) : {};
  const originalMsgs = originalReqJson.messages || [];
  const originalReplayMsg = findReplayTargetMessage(originalMsgs);
  const originalPrompt = extractReplayTargetText(originalReplayMsg);
  const editedPrompt = statusData.editedText || statusData.originalText || originalPrompt;
  const originalParsed = currentModalRecord?._sse_parsed;
  const parsedFromEvents = currentModalRecord?.sse_events?.length ? parseSseEvents(currentModalRecord.sse_events) : null;
  const originalResult = convertOriginalResponseToResult(currentModalRecord, originalParsed || parsedFromEvents);
  const replayResult = statusData.result;
  modalBody.innerHTML = `
    <div class="replay-diff-section">
      <div class="replay-diff-header">
        <h4>对比视图</h4>
        <button class="replay-btn replay-btn-secondary replay-btn-sm" onclick="switchToEditView()">重新编辑</button>
      </div>
      <div class="replay-diff-grid">
        <div class="replay-diff-cell">
          <div class="replay-diff-cell-header"><h5>原始 Prompt</h5></div>
          <div class="replay-diff-cell-content"><pre>${esc(originalPrompt)}</pre></div>
        </div>
        <div class="replay-diff-cell">
          <div class="replay-diff-cell-header"><h5>回放 Prompt</h5></div>
          <div class="replay-diff-cell-content"><pre>${esc(editedPrompt)}</pre></div>
        </div>
        <div class="replay-diff-cell">
          <div class="replay-diff-cell-header"><h5>原始响应</h5></div>
          <div class="replay-diff-cell-content">${renderResponseMarkdownNoThinking(originalResult)}</div>
        </div>
        <div class="replay-diff-cell">
          <div class="replay-diff-cell-header"><h5>回放响应</h5></div>
          <div class="replay-diff-cell-content">${renderResponseMarkdown(replayResult)}</div>
        </div>
      </div>
    </div>
  `;
}

function extractMsgText(msg) {
  if (!msg) return '';
  const content = msg.content;
  if (typeof content === 'string') return stripLeadingSystemText(content);
  if (Array.isArray(content)) {
    const parts = [];
    for (const block of content) {
      if (block.type === 'text' && block.text) {
        const text = stripLeadingSystemText(block.text);
        if (text) parts.push(text);
      }
      else if (block.type === 'thinking' && block.thinking) parts.push(`[Thinking] ${block.thinking}`);
      else if (block.type === 'tool_result' && block.content) {
        if (typeof block.content === 'string') parts.push(`[Tool Result] ${block.content}`);
        else if (Array.isArray(block.content)) {
          const toolTexts = block.content.filter(c => c.type === 'text').map(c => c.text).join('\n');
          parts.push(`[Tool Result] ${toolTexts}`);
        }
      } else if (block.type === 'tool_use') {
        parts.push(`[Tool Use: ${block.name}] ${JSON.stringify(block.input)}`);
      }
    }
    return parts.join('\n\n');
  }
  if (msg.text) return msg.text;
  if (msg.thinking) return msg.thinking;
  return '';
}

function hasToolResultContent(msg) {
  const content = msg?.content;
  return Array.isArray(content) && content.some(block => block?.type === 'tool_result');
}

function stripLeadingSystemText(text) {
  let value = String(text || '').trim();
  let previous = null;
  while (value && value !== previous) {
    previous = value;
    value = value
      .replace(/^<system-reminder\b[^>]*>[\s\S]*?<\/system-reminder>\s*/i, '')
      .replace(/^<local-command\b[^>]*>[\s\S]*?<\/local-command>\s*/i, '')
      .trim();
  }
  return value;
}

function extractRawReplayText(msg) {
  if (!msg) return '';
  const content = msg.content;
  if (typeof content === 'string') return content;
  if (!Array.isArray(content)) return msg.text || msg.thinking || '';
  const parts = [];
  for (const block of content) {
    if (!block) continue;
    if (block.type === 'text' && block.text) parts.push(block.text);
    else if (block.type === 'tool_result') parts.push(JSON.stringify(block, null, 2));
    else if (block.type === 'tool_use') parts.push(JSON.stringify(block, null, 2));
    else parts.push(JSON.stringify(block, null, 2));
  }
  return parts.join('\n\n').trim();
}

function extractReplayUserText(msg) {
  if (!msg || msg.role !== 'user') return '';
  if (hasToolResultContent(msg)) return '';
  const content = msg.content;
  if (typeof content === 'string') return stripLeadingSystemText(content);
  if (!Array.isArray(content)) return '';
  const parts = [];
  for (const block of content) {
    if (block?.type !== 'text' || !block.text) continue;
    const text = stripLeadingSystemText(block.text);
    if (text) parts.push(text);
  }
  return parts.join('\n\n').trim();
}

function extractReplayTargetText(msg) {
  if (!msg) return '';
  if (msg.role === 'user' && !hasToolResultContent(msg)) {
    return extractReplayUserText(msg);
  }
  return extractRawReplayText(msg);
}

function findReplayTargetMessage(messages) {
  if (!Array.isArray(messages) || messages.length === 0) return null;
  return messages[messages.length - 1] || null;
}

function findReplayUserMessage(messages) {
  for (let i = messages.length - 1; i >= 0; i--) {
    const msg = messages[i];
    if (msg?.role !== 'user') continue;
    if (extractReplayUserText(msg)) return msg;
  }
  return null;
}

function convertSseParsedToResult(sseParsed) {
  if (!sseParsed || !sseParsed.contents) return null;
  const content = [];
  sseParsed.contents.forEach(item => {
    if (item.type === 'text') content.push({ type: 'text', text: item.text });
    else if (item.type === 'tool_use') content.push({ type: 'tool_use', name: item.name, input: item.input });
    else if (item.type === 'tool_result') content.push({ type: 'tool_result', content: item.content });
  });
  return { content };
}

function convertOriginalResponseToResult(record, sseParsed) {
  if (sseParsed?.contents?.length) return convertSseParsedToResult(sseParsed);
  const body = record?.response?.body || '';
  if (!body) return null;
  try {
    return JSON.parse(body);
  } catch {
    return { content: [{ type: 'text', text: body }] };
  }
}

function renderResponseMarkdown(responseJson) {
  if (!responseJson) return '<div style="color:var(--text-tertiary);font-style:italic">无内容</div>';
  const content = responseJson.content || [];
  if (content.length === 0) return '<div style="color:var(--text-tertiary);font-style:italic">无内容</div>';
  let html = '';
  content.forEach(block => {
    if (block.type === 'text' && block.text) {
      html += renderMarkdown(block.text);
    } else if (block.type === 'tool_use') {
      html += `<div style="background:var(--bg-surface);padding:10px;border-radius:4px;margin:8px 0;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--accent);margin-bottom:4px">Tool: ${esc(block.name || '')}</div>
        <pre style="font-size:11px;overflow-x:auto">${esc(JSON.stringify(block.input, null, 2))}</pre>
      </div>`;
    } else if (block.type === 'tool_result') {
      let toolContent = '';
      if (typeof block.content === 'string') toolContent = block.content;
      else if (Array.isArray(block.content)) toolContent = block.content.filter(c => c.type === 'text').map(c => c.text).join('\n');
      html += `<div style="background:color-mix(in srgb, var(--success) 8%, transparent);padding:10px;border-radius:4px;margin:8px 0;border-left:3px solid var(--success)">
        <div style="font-size:10px;color:var(--success);margin-bottom:4px">Tool Result</div>
        <div style="font-size:12px">${esc(toolContent)}</div>
      </div>`;
    }
  });
  return html || '<div style="color:var(--text-tertiary);font-style:italic">无内容</div>';
}

async function switchToEditView() {
  if (!currentModalRecord) return;
  const statusResp = await fetch(`${apiBase()}/api/replay/status?recordKey=${encodeURIComponent(currentModalRecordKey)}`);
  const statusData = await statusResp.json();
  let editText = '';
  if (statusData.ok && statusData.hasReplay) {
    editText = statusData.editedText || statusData.originalText || '';
  } else {
    try {
      const body = JSON.parse(currentModalRecord.request?.body || '{}');
      const msgs = body.messages || [];
      const replayMsg = findReplayTargetMessage(msgs);
      if (replayMsg) editText = extractReplayTargetText(replayMsg);
    } catch {}
  }
  let msgTypeHint = '';
  try {
    const body = JSON.parse(currentModalRecord.request?.body || '{}');
    const msgs = body.messages || [];
    const replayMsg = findReplayTargetMessage(msgs);
    if (replayMsg) msgTypeHint = `[${replayMsg.role}${replayMsg.name ? ': ' + replayMsg.name : ''}]`;
  } catch {}
  const modalBody = document.getElementById('replayModalBody');
  modalBody.innerHTML = `
    <div class="replay-edit-section">
      <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px">编辑消息内容 ${esc(msgTypeHint)}</div>
      <textarea id="replayModalTextarea" class="replay-textarea" placeholder="输入消息内容...">${esc(editText)}</textarea>
      <div class="replay-actions">
        <button class="replay-btn replay-btn-secondary" onclick="sendReplayFromModal(true)">原文不改，直接回放</button>
        <button class="replay-btn replay-btn-primary" onclick="sendReplayFromModal(false)">发送改写版本</button>
      </div>
    </div>
    <div id="replayModalResult" style="flex:1;overflow:auto;"></div>
  `;
}

async function sendReplayFromModal(useOriginal) {
  const textarea = document.getElementById('replayModalTextarea');
  const resultDiv = document.getElementById('replayModalResult');
  const editedText = useOriginal ? null : textarea.value;
  setReplayRunning(true, currentModalRecordKey);
  resultDiv.innerHTML = `<div class="replay-loading"><span class="replay-spinner"></span><span>请求中...</span></div>`;
  document.querySelectorAll('.replay-btn').forEach(btn => btn.disabled = true);
  try {
    const record = currentModalRecord;
    const reqJson = JSON.parse(record.request?.body || '{}');
    const msgs = reqJson.messages || [];
    const userMsg = findReplayTargetMessage(msgs);
    const originalText = extractReplayTargetText(userMsg);
    const createResp = await fetch(`${apiBase()}/api/replay/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ record, reqJson, userMsg, originalText, recordKey: currentModalRecordKey })
    });
    if (!createResp.ok) throw new Error(`Failed to create session: ${createResp.status}`);
    const createData = await createResp.json();
    if (!createData.ok) throw new Error(createData.error || 'Failed to create session');
    const sendResp = await fetch(`${apiBase()}/api/replay/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: createData.sessionId, editedText })
    });
    if (!sendResp.ok) {
      const errorText = await sendResp.text();
      throw new Error(`HTTP ${sendResp.status}: ${errorText}`);
    }
    const sendData = await sendResp.json();
    if (!sendData.ok) throw new Error(sendData.error || 'Unknown error');
    const statusResp = await fetch(`${apiBase()}/api/replay/status?recordKey=${encodeURIComponent(currentModalRecordKey)}`);
    const statusData = await statusResp.json();
    if (statusData.ok && statusData.hasReplay) renderReplayDiffView(statusData);
  } catch (err) {
    resultDiv.innerHTML = `<div style="color:var(--danger);padding:20px">错误: ${esc(err.message)}</div>`;
  } finally {
    document.querySelectorAll('.replay-btn').forEach(btn => btn.disabled = false);
    setReplayRunning(false, null);
  }
}

init();
</script>

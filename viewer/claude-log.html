<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ccwhat · Session Log</title>
<!-- Anti-FOUC: apply theme before first paint -->
<script>
(function(){
  var s = localStorage.getItem('ccwhat-theme');
  var d = s || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', d);
})();
</script>
<style>
/* ── Token system ── */
:root {
  --bg-base:       #ffffff;
  --bg-surface:    #f5f5f7;
  --bg-elevated:   #ffffff;
  --border:        rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text-primary:  #1d1d1f;
  --text-secondary:#6e6e73;
  --text-tertiary: #aeaeb2;
  --accent:        #0071e3;
  --accent-hover:  #0077ed;
  --success:       #30d158;
  --warning:       #ff9f0a;
  --danger:        #ff3b30;
  --font-sans:     -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
  --font-mono:     "SF Mono", ui-monospace, "Cascadia Code", monospace;
  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     14px;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  /* type badge colors */
  --type-user-bg:  rgba(48,209,88,0.12);
  --type-user-fg:  #1c8c3c;
  --type-asst-bg:  rgba(0,113,227,0.12);
  --type-asst-fg:  #0051a8;
  --type-sys-bg:   rgba(175,82,222,0.12);
  --type-sys-fg:   #7a2fa0;
  --type-att-bg:   rgba(255,159,10,0.12);
  --type-att-fg:   #b36a00;
  --type-perm-bg:  rgba(255,59,48,0.12);
  --type-perm-fg:  #c0251c;
  --type-fhs-bg:   rgba(100,100,255,0.12);
  --type-fhs-fg:   #3030c0;
  --type-queue-bg: rgba(48,209,88,0.08);
  --type-queue-fg: #1c8c3c;
  --type-other-bg: rgba(0,0,0,0.05);
  --type-other-fg: #6e6e73;
}
[data-theme="dark"] {
  --bg-base:       #0d0d0d;
  --bg-surface:    #161616;
  --bg-elevated:   #1e1e1e;
  --border:        rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text-primary:  #f0f0f0;
  --text-secondary:#8a8a8a;
  --text-tertiary: #555555;
  --accent:        #57b5ff;
  --accent-hover:  #7ac4ff;
  --success:       #30d158;
  --warning:       #ff9f0a;
  --danger:        #ff453a;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
  --type-user-bg:  rgba(48,209,88,0.12);
  --type-user-fg:  #30d158;
  --type-asst-bg:  rgba(87,181,255,0.12);
  --type-asst-fg:  #57b5ff;
  --type-sys-bg:   rgba(175,82,222,0.12);
  --type-sys-fg:   #bf5af2;
  --type-att-bg:   rgba(255,159,10,0.12);
  --type-att-fg:   #ff9f0a;
  --type-perm-bg:  rgba(255,69,58,0.12);
  --type-perm-fg:  #ff6961;
  --type-fhs-bg:   rgba(100,100,255,0.12);
  --type-fhs-fg:   #7a7aff;
  --type-queue-bg: rgba(48,209,88,0.08);
  --type-queue-fg: #30d158;
  --type-other-bg: rgba(255,255,255,0.05);
  --type-other-fg: #8a8a8a;
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  transition: background-color 0.25s ease, color 0.2s ease,
              border-color 0.2s ease, box-shadow 0.2s ease;
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}

body {
  font-family: var(--font-sans);
  background: var(--bg-base); color: var(--text-primary);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  transition: background 0.2s, color 0.2s;
}

/* ── Theme toggle ── */
  .theme-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--bg-surface); border: 1px solid var(--border);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-left: 4px;
    transition: background 0.2s, border-color 0.2s, transform 0.25s ease, color 0.15s;
    color: var(--text-secondary);
  }
  .theme-btn:hover {
    background: var(--bg-elevated);
    border-color: var(--border-strong);
    transform: rotate(22deg) scale(1.08);
    color: var(--text-primary);
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--bg-elevated); border-bottom: 1px solid var(--border);
    padding: 8px 14px; display: flex; align-items: center;
    gap: 6px 8px; flex-shrink: 0; flex-wrap: wrap;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .topbar h1 { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; letter-spacing: -0.01em; }
  /* ── Topbar groups ── */
  .topbar-group { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .topbar-context { flex: 1 1 400px; min-width: 260px; }
  .topbar-filters { flex: 2 1 340px; min-width: 180px; flex-wrap: wrap; gap: 5px 6px; }
  .topbar-actions {
    flex: 0 0 auto; margin-left: auto;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .topbar-actions .btn,
  .topbar-actions .nav-link { flex: 0 0 auto; white-space: nowrap; }
  #projectSel { flex: 1 1 180px; min-width: 130px; max-width: 300px; }
  #sessionSel { flex: 1 1 200px; min-width: 130px; max-width: 300px; }
  #searchBox  { flex: 0 1 150px; min-width: 90px; width: 130px; }
  @media (max-width: 1200px) {
    .topbar-filters { flex-basis: 100%; order: 3; }
    .topbar-actions { order: 2; margin-left: 0; }
  }
  .adv-wrap { position: relative; }
  .adv-btn {
    background: var(--bg-surface); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px 8px; font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: var(--font-sans); transition: background 0.1s, color 0.1s;
  }
  .adv-btn:hover { color: var(--text-primary); background: var(--bg-base); }
  .adv-panel {
    display: none; position: absolute; top: calc(100% + 6px); left: 0;
    background: var(--bg-elevated); border: 1px solid var(--border-strong); border-radius: var(--radius-md);
    padding: 12px 14px; z-index: 100; min-width: 260px;
    box-shadow: var(--shadow-md);
  }
  .adv-panel.open { display: block; }
  .adv-panel label { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .adv-panel .field { width: 100%; }
  .field {
    background: var(--bg-surface); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px 8px; font-size: 12px; font-family: var(--font-sans);
    transition: border-color 0.15s;
  }
  .field:focus { outline: none; border-color: var(--accent); }
  select.field { cursor: pointer; }
  .btn {
    background: var(--bg-surface); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: var(--font-sans); transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-elevated); }
  .btn:disabled { opacity: 0.55; cursor: default; }
  .btn:disabled:hover { background: var(--bg-surface); }
  .badge { font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
  .nav-links { margin-left: auto; display: flex; gap: 10px; }
  .nav-link { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }

  /* ── Main layout ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Left: entry list ── */
  .list-panel {
    width: 380px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg-surface);
  }
  .entry-list { flex: 1; overflow-y: auto; }

  /* Tree group header */
  .tree-group-hdr {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: var(--bg-elevated); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1;
  }
  .tree-arrow { font-size: 13px; color: var(--accent); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  .tree-arrow.open { transform: rotate(90deg); }
  .tree-group-label { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .tree-group-desc { font-size: 11px; color: var(--text-secondary); }
  .tree-group-count { font-size: 10px; color: var(--text-tertiary); background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 1px 6px; margin-left: auto; }
  .tree-group-body {
    overflow: hidden;
    max-height: 8000px;
    opacity: 1;
    transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
  }
  .tree-group-body.hidden { max-height: 0; opacity: 0; }
  .tree-item { padding-left: 18px; }

  /* Turn header (user prompt root) */
  .turn-hdr {
    display: flex; align-items: flex-start; gap: 5px;
    padding: 6px 10px 5px 22px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    background: var(--bg-base);
  }
  .turn-hdr:hover { background: var(--bg-surface); }
  .turn-arrow { font-size: 12px; color: var(--accent); margin-top: 1px; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); flex-shrink: 0; }
  .turn-arrow.open { transform: rotate(90deg); }
  .turn-hdr-content { flex: 1; min-width: 0; }
  .turn-hdr-row1 { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
  .turn-lineno { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); flex-shrink: 0; }
  .turn-summary { font-size: 12px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .turn-count { font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; }
  .turn-body {
    overflow: hidden;
    max-height: 8000px;
    opacity: 1;
    transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
  }
  .turn-body.hidden { max-height: 0; opacity: 0; }
  /* Children of a turn — deeper indent with visual distinction */
  .turn-child {
    padding-left: 30px;
    border-left: 2px solid var(--border);
    margin-left: 10px;
    background: var(--bg-surface);
  }
  .turn-child:hover { background: var(--bg-elevated); }
  .turn-child.active { background: color-mix(in srgb, var(--accent) 8%, var(--bg-base)) !important; border-left-color: var(--accent); }

  .entry-item {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .1s;
  }
  .entry-item:hover { background: var(--bg-elevated); }
  .entry-item.active { background: color-mix(in srgb, var(--accent) 8%, var(--bg-base)); border-left: 3px solid var(--accent); padding-left: 7px; }

  .ei-row1 { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .ei-ts { font-size: 10px; color: var(--text-secondary); }

  /* Type badges */
  .type-badge {
    font-size: 10px; font-weight: 600; padding: 1px 5px;
    border-radius: 3px; white-space: nowrap;
  }
  .type-user     { background: var(--type-user-bg); color: var(--type-user-fg); }
  .type-assistant{ background: var(--type-asst-bg); color: var(--type-asst-fg); }
  .type-system   { background: var(--type-sys-bg); color: var(--type-sys-fg); }
  .type-attachment { background: var(--type-att-bg); color: var(--type-att-fg); }
  .type-permission-mode      { background: var(--type-perm-bg); color: var(--type-perm-fg); }
  .type-file-history-snapshot{ background: var(--type-fhs-bg); color: var(--type-fhs-fg); }
  .type-queue-operation { background: var(--type-queue-bg); color: var(--type-queue-fg); }
  .type-other    { background: var(--type-other-bg); color: var(--type-other-fg); }

  .sidechain-badge {
    font-size: 9px; padding: 1px 4px; border-radius: 3px;
    background: var(--bg-surface); color: var(--text-tertiary); border: 1px solid var(--border);
  }
  .ei-summary {
    font-size: 11px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ei-uuid { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); }

  /* ── Right: detail ── */
  .detail-panel { flex: 1; overflow-y: auto; padding: 14px; background: var(--bg-base); }
  .empty-detail {
    height: 100%; display: flex; align-items: center;
    justify-content: center; color: var(--text-tertiary); font-size: 13px;
  }

  .detail-meta {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .detail-type { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .detail-ts { font-size: 12px; color: var(--text-secondary); }
  .detail-uuid { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }
  .agent-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--type-sys-bg); color: var(--type-sys-fg); border: 1px solid var(--type-sys-fg);
    font-family: var(--font-mono); white-space: nowrap; opacity: 0.8;
  }
  .skill-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: var(--type-user-bg); color: var(--type-user-fg); border: 1px solid var(--type-user-fg);
    white-space: nowrap; opacity: 0.8;
  }

  /* Section */
  .section { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; }
  .sec-hdr {
    background: var(--bg-surface); padding: 7px 12px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .sec-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .sec-toggle { font-size: 11px; color: var(--accent); }
  .sec-body {
    padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg-elevated);
    overflow: hidden;
    max-height: 8000px;
    opacity: 1;
    transition: max-height 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease,
                padding 0.2s ease;
  }
  .sec-body.content-bg { background: var(--bg-surface); }
  .sec-body.hidden { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; }

  /* Content blocks */
  .content-text {
    font-size: 13px; line-height: 1.65; color: var(--text-primary);
    white-space: pre-wrap; word-break: break-word;
  }
  .tool-row {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .tool-row:last-child { border-bottom: none; }
  .tool-name { color: var(--accent); font-weight: 600; min-width: 120px; font-family: var(--font-mono); }
  .tool-input { color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px; word-break: break-all; }

  /* Type filter checkboxes */
  .type-filters { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .type-check {
    display: flex; align-items: center; gap: 3px;
    font-size: 11px; cursor: pointer; user-select: none;
    padding: 2px 7px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-tertiary);
    transition: all .1s;
  }
  .type-check input { display: none; }
  .type-check.checked-user     { background: var(--type-user-bg); border-color: var(--type-user-fg); color: var(--type-user-fg); }
  .type-check.checked-assistant{ background: var(--type-asst-bg); border-color: var(--type-asst-fg); color: var(--type-asst-fg); }
  .type-check.checked-system   { background: var(--type-sys-bg); border-color: var(--type-sys-fg); color: var(--type-sys-fg); }
  .type-check.checked-attachment{ background: var(--type-att-bg); border-color: var(--type-att-fg); color: var(--type-att-fg); }
  .type-check.checked-permission-mode       { background: var(--type-perm-bg); border-color: var(--type-perm-fg); color: var(--type-perm-fg); }
  .type-check.checked-file-history-snapshot { background: var(--type-fhs-bg); border-color: var(--type-fhs-fg); color: var(--type-fhs-fg); }
  .type-check.checked-queue-operation { background: var(--type-queue-bg); border-color: var(--type-queue-fg); color: var(--type-queue-fg); }
  .type-check.checked-other    { background: var(--type-other-bg); border-color: var(--type-other-fg); color: var(--type-other-fg); }

  /* Line number */
  .ei-lineno { font-size: 10px; color: var(--text-tertiary); font-family: var(--font-mono); min-width: 28px; text-align: right; flex-shrink: 0; }

  /* Raw JSON — syntax highlighted */
  .raw-json {
    font-family: var(--font-mono);
    font-size: 11px; line-height: 1.6;
    white-space: pre-wrap; word-break: break-all;
    background: var(--bg-surface); border-radius: 4px; padding: 10px;
    max-height: 9999px; overflow-y: auto;
  }
  .json-key    { color: var(--accent); }
  .json-str    { color: color-mix(in srgb, var(--accent) 60%, var(--text-primary)); }
  .json-num    { color: var(--warning); }
  .json-bool   { color: var(--danger); }
  .json-null   { color: var(--danger); }
  .json-punct  { color: var(--text-secondary); }

  /* Info grid */
  .info-grid { display: grid; grid-template-columns: 130px 1fr; gap: 5px 10px; font-size: 12px; }
  .ig-k { color: var(--text-secondary); }
  .ig-v { color: var(--text-primary); word-break: break-all; font-family: var(--font-mono); font-size: 11px; }

  /* Placeholder / spinner */
  .placeholder { color: var(--text-tertiary); font-size: 13px; padding: 20px; text-align: center; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .6s linear infinite; margin: 24px auto; display: block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .md-view { font-size: 13px; line-height: 1.7; color: var(--text-primary); padding: 4px 0; }
  .md-view h1,.md-view h2,.md-view h3,.md-view h4,.md-view h5,.md-view h6 { color: var(--text-primary); margin: 14px 0 7px; line-height: 1.35; font-weight: 600; }
  .md-view h1 { font-size: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .md-view h2 { font-size: 17px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .md-view h3 { font-size: 15px; }
  .md-view h4,.md-view h5,.md-view h6 { font-size: 14px; }
  .md-view p { margin: 7px 0; }
  .md-view code { background: var(--bg-surface); border: 1px solid var(--border); padding:1px 4px; border-radius:3px; font-family: var(--font-mono); font-size:11px; }
  .md-view pre { background: var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; margin:10px 0; overflow-x:auto; font-size:12px; font-family: var(--font-mono); line-height:1.55; }
  .md-view pre code { background: transparent; padding: 0; border: none; border-radius: 0; font-size: inherit; }
  .md-view pre[data-lang]::before {
    content: attr(data-lang); display: block; color: var(--text-tertiary); font-size: 10px;
    text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0;
  }
  .md-view ul,.md-view ol { padding-left:22px; margin:7px 0; }
  .md-view li { margin:3px 0; }
  .md-view strong { color: var(--text-primary); font-weight: 600; }
  .md-view em { color: var(--text-secondary); }
  .md-view blockquote { border-left: 3px solid var(--accent); padding: 6px 10px; margin: 10px 0; color: var(--text-secondary); background: var(--bg-surface); border-radius: 0 4px 4px 0; }
  .md-view .md-table-wrap { overflow-x: auto; margin: 12px 0; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  .md-view table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 520px; }
  .md-view th { background: var(--bg-surface); color: var(--text-primary); font-weight: 600; text-align: left; }
  .md-view th,.md-view td { padding: 7px 9px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: top; }
  .md-view th:last-child,.md-view td:last-child { border-right: none; }
  .md-view tr:last-child td { border-bottom: none; }

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ccwhat-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '☾';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀' : '☾';
})();

function escRaw(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function renderMarkdownInline(text) {
  const codeSpans = [];
  let s = String(text ?? '').replace(/`([^`]+)`/g, (_, code) => {
    const token = `\u0000CODE${codeSpans.length}\u0000`;
    codeSpans.push(`<code>${escRaw(code)}</code>`);
    return token;
  });
  s = escRaw(s);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  codeSpans.forEach((html, i) => {
    s = s.replace(`\u0000CODE${i}\u0000`, html);
  });
  return s;
}

function splitMarkdownTableRow(line) {
  let row = line.trim();
  if (row.startsWith('|')) row = row.slice(1);
  if (row.endsWith('|')) row = row.slice(0, -1);
  return row.split('|').map(cell => cell.trim());
}

function isMarkdownTableSeparator(line) {
  const cells = splitMarkdownTableRow(line);
  return cells.length > 1 && cells.every(cell => /^:?-{3,}:?$/.test(cell));
}

function renderMarkdown(text) {
  const lines = String(text ?? '').replace(/\r\n/g, '\n').split('\n');
  const html = [];

  const renderList = (tag, items) => {
    html.push(`<${tag}>${items.map(item => `<li>${renderMarkdownInline(item)}</li>`).join('')}</${tag}>`);
  };

  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (!line.trim()) { i += 1; continue; }

    const fence = line.match(/^```([A-Za-z0-9_-]+)?\s*$/);
    if (fence) {
      const lang = fence[1] || '';
      const code = [];
      i += 1;
      while (i < lines.length && !/^```\s*$/.test(lines[i])) {
        code.push(lines[i]);
        i += 1;
      }
      if (i < lines.length) i += 1;
      if (lang.toLowerCase() === 'mermaid') {
        html.push(`<div class="md-mermaid-wrap"><div class="md-mermaid">${escRaw(code.join('\n'))}</div></div>`);
        continue;
      }
      const langAttr = lang ? ` data-lang="${escRaw(lang)}"` : '';
      html.push(`<pre class="md-code-block"${langAttr}><code>${escRaw(code.join('\n'))}</code></pre>`);
      continue;
    }

    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    if (heading) {
      const level = heading[1].length;
      html.push(`<h${level}>${renderMarkdownInline(heading[2].trim())}</h${level}>`);
      i += 1;
      continue;
    }

    if (i + 1 < lines.length && line.includes('|') && isMarkdownTableSeparator(lines[i + 1])) {
      const headers = splitMarkdownTableRow(line);
      i += 2;
      const rows = [];
      while (i < lines.length && lines[i].trim() && lines[i].includes('|')) {
        rows.push(splitMarkdownTableRow(lines[i]));
        i += 1;
      }
      const thead = headers.map(cell => `<th>${renderMarkdownInline(cell)}</th>`).join('');
      const tbody = rows.map(row =>
        `<tr>${headers.map((_, idx) => `<td>${renderMarkdownInline(row[idx] || '')}</td>`).join('')}</tr>`
      ).join('');
      html.push(`<div class="md-table-wrap"><table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`);
      continue;
    }

    const unordered = line.match(/^\s*[-*+]\s+(.+)$/);
    if (unordered) {
      const items = [];
      while (i < lines.length) {
        const item = lines[i].match(/^\s*[-*+]\s+(.+)$/);
        if (!item) break;
        items.push(item[1]);
        i += 1;
      }
      renderList('ul', items);
      continue;
    }

    const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
    if (ordered) {
      const items = [];
      while (i < lines.length) {
        const item = lines[i].match(/^\s*\d+\.\s+(.+)$/);
        if (!item) break;
        items.push(item[1]);
        i += 1;
      }
      renderList('ol', items);
      continue;
    }

    if (/^>\s?/.test(line)) {
      const parts = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        parts.push(lines[i].replace(/^>\s?/, ''));
        i += 1;
      }
      html.push(`<blockquote>${renderMarkdownInline(parts.join(' '))}</blockquote>`);
      continue;
    }

    const paragraph = [line.trim()];
    i += 1;
    while (
      i < lines.length &&
      lines[i].trim() &&
      !/^```/.test(lines[i]) &&
      !/^(#{1,6})\s+/.test(lines[i]) &&
      !/^\s*[-*+]\s+/.test(lines[i]) &&
      !/^\s*\d+\.\s+/.test(lines[i]) &&
      !/^>\s?/.test(lines[i])
    ) {
      if (i + 1 < lines.length && lines[i].includes('|') && isMarkdownTableSeparator(lines[i + 1])) break;
      paragraph.push(lines[i].trim());
      i += 1;
    }
    html.push(`<p>${renderMarkdownInline(paragraph.join(' '))}</p>`);
  }

  return html.join('');
}

function fallbackMermaidBlock(node, reason) {
  const source = node.textContent || '';
  const pre = document.createElement('pre');
  pre.className = 'md-code-block md-mermaid-fallback';
  pre.setAttribute('data-lang', reason ? `mermaid (${reason})` : 'mermaid');
  const code = document.createElement('code');
  code.textContent = source;
  pre.appendChild(code);

  const wrap = node.closest('.md-mermaid-wrap');
  if (wrap) {
    wrap.innerHTML = '';
    wrap.appendChild(pre);
  } else {
    node.replaceWith(pre);
  }
}

function renderMermaidBlocks(root) {
  const nodes = Array.from(root.querySelectorAll('.md-mermaid'));
  if (!nodes.length) return;

  if (!window.mermaid || typeof window.mermaid.run !== 'function') {
    nodes.forEach(node => fallbackMermaidBlock(node, 'library unavailable'));
    return;
  }

  try {
    window.mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'strict'
    });
    Promise.resolve(window.mermaid.run({ nodes })).catch(() => {
      nodes.forEach(node => {
        if (!node.querySelector('svg')) fallbackMermaidBlock(node, 'render failed');
      });
    });
  } catch (err) {
    nodes.forEach(node => fallbackMermaidBlock(node, 'render failed'));
  }
}

let allProjects = [];
// Groups: [{id, label, desc, entries: [{...entry, _gid, _idx}]}]
// allEntries: flat index for detail lookup by _idx
let groups = [];
let allEntries = [];
let selectedIdx = -1;
// Track collapsed state per group id
const groupCollapsed = {};
const analysisReports = {};  // key: analysisCacheKey(sessionId, mode, customPrompt)
let analysisInFlight = false;
let selectedMode = 'yuanxi';

function promptFingerprint(text) {
  let h = 0;
  const s = String(text || '');
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return h.toString(36);
}

function analysisCacheKey(sessionId, mode, customPrompt) {
  return `${sessionId}:${mode}:${promptFingerprint(customPrompt)}`;
}

function toggleAdv() {

}
document.addEventListener('click', e => {

function apiBase() {

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtTs(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleString('zh-CN', {hour12:false}); } catch { return ts; }
}
function trunc(s, n) { s = String(s??''); return s.length>n ? s.slice(0,n)+'…' : s; }

// ── JSON syntax highlighter ───────────────────────────────────────────────
function syntaxHighlightJson(obj) {
  const json = JSON.stringify(obj, null, 2);
  // Tokenize and colorize
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?|[{}\[\],:])/g,
    match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) {
          // key
          return `<span class="json-key">${esc(match)}</span>`;
        }
        return `<span class="json-str">${esc(match)}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
      if (/^-?\d/.test(match)) return `<span class="json-num">${match}</span>`;
      return `<span class="json-punct">${esc(match)}</span>`;
    }
  );
}

async function init() {

    allProjects = await resp.json();

      opt.value = p.projectDir;
      opt.textContent = p.projectDir;
      if (p.projectDir === curProject) opt.selected = true;

function fmtSessionLabel(s) {
  const id = typeof s === 'string' ? s : s.id;
  const first = typeof s === 'object' && s.firstTimestamp ? fmtTs(s.firstTimestamp) : null;
  const last  = typeof s === 'object' && s.lastTimestamp  ? fmtTs(s.lastTimestamp)  : null;
  const times = first ? (last && last !== first ? `${first} ~ ${last}` : first) : '';
  return times ? `${id}  (${times})` : id;
}

function onProjectChange(restoreSession) {
  resetAnalysisState();
  const projectDir = document.getElementById('projectSel').value;
  const proj = allProjects.find(p => p.projectDir === projectDir);
  const sel = document.getElementById('sessionSel');
  sel.innerHTML = '<option value="">— session —</option>';
  if (proj) {
    for (const s of proj.sessions) {
      const id = typeof s === 'string' ? s : s.id;
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = fmtSessionLabel(s);
      opt.title = id;
      sel.appendChild(opt);
    }
    if (restoreSession) {
      sel.value = restoreSession;
      if (sel.value) { loadSession(); return; }
    }
    if (proj.sessions.length === 1) {
      sel.value = typeof proj.sessions[0] === 'string' ? proj.sessions[0] : proj.sessions[0].id;
      loadSession();
    }
  }
}

// ── Convert normalized events to Claude-style entries ────────────────────
function formatEventContent(content) {
  if (content === undefined || content === null) return '';
  if (typeof content === 'string') return content;
  try {
    return JSON.stringify(content, null, 2);
  } catch {
    return String(content);
  }
}

function eventsToEntries(events) {
  const entries = [];
  for (const ev of events || []) {
    const role = ev.role;
    const kind = ev.kind;

    if (role === 'user' && kind === 'message') {
      entries.push({
        type: 'user',
        timestamp: ev.timestamp,
        uuid: ev.id,
        sessionId: ev.sessionId,
        _fileLine: 0,
        message: { content: [{ type: 'text', text: ev.content || '' }] },
      });
    } else if (role === 'assistant' && kind === 'message') {
      const msg = { content: [{ type: 'text', text: ev.content || '' }] };
      if (ev.usage && (ev.usage.inputTokens || ev.usage.outputTokens)) {
        msg.usage = { input_tokens: ev.usage.inputTokens, output_tokens: ev.usage.outputTokens };
      }
      entries.push({
        type: 'assistant',
        timestamp: ev.timestamp,
        uuid: ev.id,
        sessionId: ev.sessionId,
        _fileLine: 0,
        message: msg,
      });
    } else if (role === 'assistant' && kind === 'tool_call') {
      entries.push({
        type: 'assistant',
        timestamp: ev.timestamp,
        uuid: ev.id,
        sessionId: ev.sessionId,
        _fileLine: 0,
        message: { content: [{ type: 'tool_use', name: ev.toolName, input: ev.content || {} }] },
      });
    } else if (role === 'tool' && kind === 'tool_result') {
      entries.push({
        type: 'user',
        timestamp: ev.timestamp,
        uuid: ev.id,
        sessionId: ev.sessionId,
        _fileLine: 0,
        message: { content: [{ type: 'tool_result', tool_use_id: ev.toolCallId, content: ev.content || '' }] },
      });
    } else if (kind === 'reasoning') {
      entries.push({
        type: 'assistant',
        timestamp: ev.timestamp,
        uuid: ev.id,
        sessionId: ev.sessionId,
        _fileLine: 0,
        message: { content: [{ type: 'text', text: ev.summary || ev.content || '(reasoning)' }] },
      });
    } else if (kind === 'metadata' || kind === 'step' || kind === 'unknown') {
      let label = kind;
      if (ev.summary) label += ': ' + ev.summary;
      entries.push({
        type: 'system',
        timestamp: ev.timestamp,
        uuid: ev.id,
        sessionId: ev.sessionId,
        _fileLine: 0,
        subtype: label,
        message: { content: [{ type: 'text', text: formatEventContent(ev.content) }] },
      });
    }
  }
  return entries;
}

// ── Load session entries ─────────────────────────────────────────────────
async function loadSession() {
  const sessionId = document.getElementById('sessionSel').value;
  if (!sessionId) return;

  resetAnalysisState();
  document.getElementById('entryList').innerHTML = '<span class="spinner"></span>';
  document.getElementById('detailPanel').innerHTML = '<div class="empty-detail">加载中…</div>';

  try {
    const resp = await fetch(`${apiBase()}/api/session/${sessionId}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // Build groups: main + each subagent (or events for non-Claude)
    groups = [];
    allEntries = [];

    let mainEntries = (data.main || [])
      .slice().sort((a,b) => (a._fileLine||0) - (b._fileLine||0));

    // If no main entries but events exist, convert events to entries
    if (mainEntries.length === 0 && data.events && data.events.length > 0) {
      mainEntries = eventsToEntries(data.events);
    }

    const agentLabel = data.agent && data.agent !== 'claude' ? data.agent : 'Main Session';
    const mainGroup = { id: 'main', label: `🤖 ${agentLabel}`, desc: data.sessionId?.slice(0,8) || '', entries: [] };
    for (const e of mainEntries) {
      const idx = allEntries.length;
      const tagged = { ...e, _source: 'main', _gid: 'main', _idx: idx };
      allEntries.push(tagged);
      mainGroup.entries.push(tagged);
    }
    groups.push(mainGroup);

    // Subagent groups (only for Claude)
    for (const sa of data.subagents || []) {
      const gid = `sa-${sa.agentId}`;
      const saEntries = (sa.entries || [])
        .slice().sort((a,b) => (a._fileLine||0) - (b._fileLine||0));
      groupCollapsed[gid] = true;
      const saGroup = {
        id: gid,
        label: sa.meta?.description ? `🔧 ${trunc(sa.meta.description, 28)}` : `🔧 agent-${sa.agentId.slice(0,8)}`,
        desc: sa.meta?.agentType || '',
        entries: [],
      };
      for (const e of saEntries) {
        const idx = allEntries.length;
        const tagged = { ...e, _source: gid, _gid: gid, _agentDesc: sa.meta?.description, _idx: idx };
        allEntries.push(tagged);
        saGroup.entries.push(tagged);
      }
      groups.push(saGroup);
    }

    selectedIdx = -1;
    renderList();
    document.getElementById('detailPanel').innerHTML = '<div class="empty-detail">← 点击列表项查看原始日志</div>';

    // Enable export button
    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.disabled = false;
    updateAnalyzeButton();
  } catch(e) {
    document.getElementById('entryList').innerHTML =
      `<div class="placeholder" style="color:#f85149">加载失败: ${esc(e.message)}</div>`;
  }
}

function renderAnalysisReport(cachedReport) {
  const panel = document.getElementById('detailPanel');
  const wrap = document.createElement('div');
  const isHtmlReport = cachedReport.reportType === 'html' && cachedReport.reportUrl;
  wrap.className = isHtmlReport ? 'analysis-report html-report' : 'analysis-report';
  const compression = cachedReport.compression || null;
  const compressed = compression && (compression.mode === 'timeline' || compression.mode === 'structured_html');
  const omittedEvents = compression ? Number(compression.omittedEvents || 0) : 0;
  const truncatedEvents = compression ? Number(compression.truncatedEvents || 0) : 0;
  const diagnosisStatus = cachedReport.diagnosisStatus || null;
  const reportMode = cachedReport.reportMode || '';
  const modeLabel = reportMode === 'yuanxi' ? '元析' : reportMode === 'generic' ? '通用流程' : '';

  const meta = document.createElement('div');
  meta.className = 'detail-meta';
  meta.innerHTML =
    `<span class="detail-type">当前 Session 分析报告</span>` +
    `<span class="detail-ts">${esc(cachedReport.createdAt)}</span>` +
    `<span class="detail-ts">报告生成用时 ${fmtMsShort(cachedReport.timing?.mcRunMs || cachedReport.elapsedMs)}</span>` +
    (modeLabel ? `<span class="sidechain-badge">${esc(modeLabel)}</span>` : '') +
    (compressed ? `<span class="sidechain-badge">压缩输入</span>` : '') +
    (isHtmlReport ? `<span class="sidechain-badge">HTML</span>` : '') +
    (diagnosisStatus && diagnosisStatus.available === false ? `<span class="sidechain-badge">LLM诊断降级</span>` : '') +
    (cachedReport.truncated ? `<span class="sidechain-badge">输入已截断</span>` : '');
  const actions = document.createElement('div');
  actions.className = 'analysis-actions';
  actions.innerHTML = `<button class="btn" onclick="analyzeCurrentSession()">重新分析</button>`;
  meta.appendChild(actions);
  wrap.appendChild(meta);

  if (cachedReport.truncated || omittedEvents || truncatedEvents) {
    const note = document.createElement('div');
    note.className = 'analysis-status';
    note.style.marginBottom = '12px';
    const eventText = compression
      ? `事件 ${esc(compression.events || 0)} 条，压缩字段 ${esc(truncatedEvents)} 个，省略低优先级事件 ${esc(omittedEvents)} 条。`
      : '';
    note.innerHTML = `本报告基于压缩后的交互时间线生成；${eventText}`;
    wrap.appendChild(note);
  }
  if (isHtmlReport) {
    const reportUrl = absoluteReportUrl(cachedReport.reportUrl);
    const exportUrl = cachedReport.exportUrl ? absoluteReportUrl(cachedReport.exportUrl) : reportUrl + '/export';
    const card = document.createElement('div');
    card.className = 'analysis-link-card';
    card.innerHTML = `
      <div class="analysis-link-title">HTML 分析报告已生成</div>
      <div class="analysis-link-desc">
        报告已保存到当前 viewer server 的内存中。链接在当前 server 运行期间有效；重启 server 后请重新生成。
      </div>
      <div class="analysis-link-actions">
        <a class="btn" href="${escRaw(reportUrl)}" target="_blank" rel="noopener">打开报告</a>
        <a class="btn" href="${escRaw(exportUrl)}" download>导出报告</a>
      </div>`;
    wrap.appendChild(card);
    panel.innerHTML = '';
    panel.appendChild(wrap);
    return;
  }
  const body = document.createElement('div');
  body.className = 'md-view';
  body.innerHTML = renderMarkdown(cachedReport.report);
  wrap.appendChild(body);

  panel.innerHTML = '';
  panel.appendChild(wrap);
  renderMermaidBlocks(body);
}

function showCachedAnalysisReport(key) {
  const cached = key ? analysisReports[key] : null;
  if (cached) {
    renderAnalysisReport(cached);
  } else {
    analyzeCurrentSession();
  }
  updateAnalyzeButton();
}

async function requestSessionAnalysis(sessionId, mode, customPrompt) {
  const resp = await fetch(`${apiBase()}/api/analyze`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({sessionId, mode, customPrompt}),
  });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok || !data.ok) {
    const error = new Error(data.error || `HTTP ${resp.status}`);
    error.timing = data.timing || null;
    error.compression = data.compression || null;
    throw error;
  }
  return {
    reportType: data.reportType || 'html',
    reportMode: data.reportMode || mode,
    reportUrl: data.reportUrl || '',
    exportUrl: data.exportUrl || '',
    report: data.report || '',
    summary: data.summary || null,
    diagnosisStatus: data.diagnosisStatus || null,
    llmStatus: data.llmStatus || null,
    elapsedMs: data.elapsedMs || 0,
    truncated: Boolean(data.truncated),
    compression: data.compression || null,
    timing: data.timing || null,
    customPrompt: customPrompt || '',
    createdAt: new Date().toLocaleString('zh-CN', {hour12: false}),
  };
}

async function runAnalysisForCurrentSession(mode, customPrompt, {preserveKey=null} = {}) {
  const sessionId = document.getElementById('sessionSel').value;
  if (!sessionId || analysisInFlight) return;
  const cacheKey = analysisCacheKey(sessionId, mode, customPrompt);
  const previous = preserveKey ? analysisReports[preserveKey] || null : null;
  analysisInFlight = true;
  updateAnalyzeButton();
  const modeLabel = mode === 'yuanxi' ? '元析报告' : '通用流程报告';
  renderAnalysisStatus(`正在生成 ${modeLabel}…`);

  try {
    const cached = await requestSessionAnalysis(sessionId, mode, customPrompt);
    analysisReports[cacheKey] = cached;
    renderAnalysisReport(cached);
  } catch (e) {
    if (preserveKey && previous) {
      analysisReports[preserveKey] = previous;
      renderAnalysisStatus(`重新分析失败：${e.message}`, true, previous, e.timing);
    } else {
      renderAnalysisStatus(`分析失败：${e.message}`, true, null, e.timing);
    }
  } finally {
    analysisInFlight = false;
    updateAnalyzeButton();
  }
}

// ── Render list ──────────────────────────────────────────────────────────
const knownTypes = new Set(['user','assistant','system','attachment','permission-mode','file-history-snapshot','queue-operation']);
// Track collapsed state per turn key (gid + ':' + turnIdx)
const turnCollapsed = {};

function entryMatchesFilter(e) {
  const activeTypes = getActiveTypes();
  const bucket = knownTypes.has(e.type) ? e.type : 'other';
  if (!activeTypes.has(bucket)) return false;
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  if (q) {
    const hay = JSON.stringify(e).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

// Split group entries into turns: each turn starts at a real user-text entry.
// Also tags each entry with _turnKey for auto-expand on selectEntry.
function buildTurns(entries, gid) {
  const turns = [];
  let current = null;
  let turnIdx = 0;

  for (const e of entries) {
    const isRealUser = e.type === 'user' && (
      (typeof e.message?.content === 'string' && e.message.content.trim().length > 0) ||
      (Array.isArray(e.message?.content) && e.message.content.some(b => b.type === 'text' || b.type === 'image'))
    );

    if (isRealUser) {
      current = { root: e, children: [], _turnIdx: turnIdx++ };
      const tk = `${gid}:${current._turnIdx}`;
      e._turnKey = tk;
      turns.push(current);
    } else if (current) {
      e._turnKey = `${gid}:${current._turnIdx}`;
      current.children.push(e);
    } else {
      // Preamble before first user message
      if (!turns.length) {
        current = { root: null, children: [], _isPreamble: true, _turnIdx: turnIdx++ };
        turns.push(current);
      }
      e._turnKey = `${gid}:${current._turnIdx}`;
      current.children.push(e);
    }
  }
  return turns;
}

// Returns [{group, filteredEntries}]
function getFilteredGroups() {
  return groups.map(g => ({
    group: g,
    entries: g.entries.filter(entryMatchesFilter),
  })).filter(({entries}) => entries.length > 0);
}

function summarize(e) {
  const type = e.type;
  if (type === 'user') {
    const c = e.message?.content;
    if (typeof c === 'string') return trunc(c, 80);
    if (Array.isArray(c)) {
      const texts = c.filter(b => b.type==='text' && !b.text?.startsWith('<system-reminder') && !b.text?.startsWith('<local-command'));
      if (texts.length) return trunc(texts.map(b=>b.text).join(' '), 80);
      const types = [...new Set(c.map(b=>b.type))];
      return `[${types.join(', ')}]`;
    }
    return '';
  }
  if (type === 'assistant') {
    const c = e.message?.content || [];
    const texts = c.filter(b=>b.type==='text').map(b=>trunc(b.text,40));
    const tools = c.filter(b=>b.type==='tool_use').map(b=>b.name);
    const parts = [];
    if (texts.length) parts.push(texts[0]);
    if (tools.length) parts.push(`[${tools.slice(0,3).join(', ')}${tools.length>3?'…':''}]`);
    return parts.join(' ') || `[${c.map(b=>b.type).join(', ')}]`;
  }
  if (type === 'system') return e.subtype || '';
  if (type === 'attachment') return e.attachment?.type || '';
  return type;
}

// Extract agentId from entry.toolUseResult.agentId
function extractAgentId(entry) {
  if (entry.type !== 'user') return null;
  return entry.toolUseResult?.agentId || null;
}

function makeEntryEl(e, extraClass) {
  const idx = e._idx;
  const el = document.createElement('div');
  el.className = `entry-item ${extraClass}` + (idx === selectedIdx ? ' active' : '');
  el.dataset.idx = idx;
  const typeCls = knownTypes.has(e.type) ? `type-${e.type}` : 'type-other';
  const msgId = e.type === 'assistant' ? e.message?.id : null;
  const rawLink = msgId
    ? `<a href="req-resp.html?q=${encodeURIComponent(msgId)}${e.sessionId ? '&session='+encodeURIComponent(e.sessionId) : ''}${e.timestamp ? '&date='+encodeURIComponent(e.timestamp.slice(0,10)) : ''}" target="_blank"
         onclick="event.stopPropagation()"
         style="font-size:10px;color:#58a6ff;text-decoration:none;padding:1px 5px;
                border:1px solid #30363d;border-radius:3px;white-space:nowrap;margin-left:4px">原始数据 ↗</a>`
    : '';
  const agentId = extractAgentId(e);
  const agentBadge = agentId
    ? `<span class="agent-badge">🤖 agent: ${esc(agentId)}</span>`
    : '';
  const skillName = e.type === 'user' && e.toolUseResult && e.toolUseResult.commandName
    ? e.toolUseResult.commandName
    : null;
  const skillBadge = skillName
    ? `<span class="skill-badge">⚡ skill: ${esc(skillName)}</span>`
    : '';
  const extraBadges = [agentBadge, skillBadge].filter(Boolean).join(' ');
  el.innerHTML =
    `<div class="ei-row1">` +
      `<span class="ei-lineno">${e._fileLine != null ? '#'+e._fileLine : ''}</span>` +
      `<span class="ei-ts">${esc(fmtTs(e.timestamp))}</span>` +
      `<span class="type-badge ${typeCls}">${esc(e.type||'?')}</span>` +
      rawLink +
    `</div>` +
    (extraBadges ? `<div style="margin-top:3px;display:flex;gap:4px;flex-wrap:wrap">${extraBadges}</div>` : '') +
    `<div class="ei-summary">${esc(summarize(e))}</div>`;
  el.onclick = () => selectEntry(idx);
  return el;
}

function renderList() {
  const filteredGroups = getFilteredGroups();
  const list = document.getElementById('entryList');

  const totalFiltered = filteredGroups.reduce((n, {entries}) => n + entries.length, 0);
  document.getElementById('countBadge').textContent = `${totalFiltered} / ${allEntries.length}`;

  if (filteredGroups.length === 0) {
    list.innerHTML = '<div class="placeholder">无匹配条目</div>';
    return;
  }

  list.innerHTML = '';

  for (const {group, entries} of filteredGroups) {
    const isGroupCollapsed = groupCollapsed[group.id] ?? false;

    // ── Group header ────────────────────────────────────────────────────────
    const grpHdr = document.createElement('div');
    grpHdr.className = 'tree-group-hdr';
    grpHdr.dataset.gid = group.id;
    grpHdr.innerHTML =
      `<span class="tree-arrow ${isGroupCollapsed ? '' : 'open'}">▶</span>` +
      `<span class="tree-group-label">${esc(group.label)}</span>` +
      (group.desc ? `<span class="tree-group-desc">${esc(group.desc)}</span>` : '') +
      `<span class="tree-group-count">${entries.length}</span>`;
    grpHdr.onclick = () => {
      groupCollapsed[group.id] = !groupCollapsed[group.id];
      const gbody = list.querySelector(`.tree-group-body[data-gid="${group.id}"]`);
      const arrow = grpHdr.querySelector('.tree-arrow');
      if (groupCollapsed[group.id]) { gbody.classList.add('hidden'); arrow.classList.remove('open'); }
      else { gbody.classList.remove('hidden'); arrow.classList.add('open'); }
    };
    list.appendChild(grpHdr);

    // ── Group body ──────────────────────────────────────────────────────────
    const grpBody = document.createElement('div');
    grpBody.className = 'tree-group-body' + (isGroupCollapsed ? ' hidden' : '');
    grpBody.dataset.gid = group.id;

    // Build turns from the filtered entries (keep file order)
    const turns = buildTurns(entries, group.id);

    turns.forEach((turn, turnIdx) => {
      const turnKey = `${group.id}:${turnIdx}`;
      // Default collapsed: main session turns start collapsed; subagents already collapsed at group level
      const isTurnCollapsed = turnCollapsed[turnKey] ?? (group.id === 'main');

      // ── Preamble: flat items, no turn header ─────────────────────────────
      if (turn._isPreamble) {
        for (const e of turn.children) {
          if (!entryMatchesFilter(e)) continue;
          grpBody.appendChild(makeEntryEl(e, 'tree-item'));
        }
        return;
      }

      // ── Turn header (user root) ──────────────────────────────────────────
      const rootEntry = turn.root;
      const hasChildren = turn.children.filter(e => entryMatchesFilter(e)).length > 0;
      const turnLabel = summarize(rootEntry);
      const turnLineNo = rootEntry._fileLine != null ? `#${rootEntry._fileLine}` : '';

      const turnHdr = document.createElement('div');
      turnHdr.className = 'turn-hdr' + (rootEntry._idx === selectedIdx ? ' active' : '');
      turnHdr.innerHTML =
        (hasChildren
          ? `<span class="turn-arrow ${!isTurnCollapsed ? 'open' : ''}">▶</span>`
          : `<span style="width:12px;flex-shrink:0"></span>`) +
        `<div class="turn-hdr-content">` +
          `<div class="turn-hdr-row1">` +
            `<span class="turn-lineno">${esc(turnLineNo)}</span>` +
            `<span class="type-badge type-user">user</span>` +
            `<span class="turn-count">${hasChildren ? turn.children.length + ' entries' : ''}</span>` +
          `</div>` +
          `<div class="turn-summary">${esc(turnLabel)}</div>` +
        `</div>`;

      grpBody.appendChild(turnHdr);

      // ── Turn body (children, indented) ───────────────────────────────────
      let turnBody = null;
      if (hasChildren) {
        turnBody = document.createElement('div');
        turnBody.className = 'turn-body' + (isTurnCollapsed ? ' hidden' : '');
        turnBody.dataset.tkey = turnKey;
        for (const e of turn.children) {
          if (!entryMatchesFilter(e)) continue;
          turnBody.appendChild(makeEntryEl(e, 'turn-child'));
        }
        grpBody.appendChild(turnBody);
      }

      // Bind click after turnBody exists so closure captures it directly
      turnHdr.onclick = (e) => {
        // Update selected highlight without full re-render
        document.querySelectorAll('.entry-item.active, .turn-hdr.active').forEach(el => el.classList.remove('active'));
        turnHdr.classList.add('active');
        selectedIdx = rootEntry._idx;
        renderDetail(allEntries[rootEntry._idx]);

        if (hasChildren && turnBody) {
          const clickedArrow = e.target.closest('.turn-arrow');
          if (clickedArrow) {
            // Arrow click: toggle collapse
            turnCollapsed[turnKey] = !turnCollapsed[turnKey];
          } else {
            // Header click: only expand if currently collapsed
            turnCollapsed[turnKey] = false;
          }
          const arr = turnHdr.querySelector('.turn-arrow');
          if (turnCollapsed[turnKey]) { turnBody.classList.add('hidden'); arr.classList.remove('open'); }
          else { turnBody.classList.remove('hidden'); arr.classList.add('open'); }
        }
      };
    });

    list.appendChild(grpBody);
  }
}

// ── Detail ───────────────────────────────────────────────────────────────
function selectEntry(idx) {
  selectedIdx = idx;
  document.querySelectorAll('.entry-item').forEach(el =>
    el.classList.toggle('active', Number(el.dataset.idx) === idx));
  renderDetail(allEntries[idx]);
  // Auto-expand the group containing this entry
  const e = allEntries[idx];
  if (e) {
    let needRender = false;
    if (groupCollapsed[e._gid]) { groupCollapsed[e._gid] = false; needRender = true; }
    // Find turn key for this entry and auto-expand if collapsed
    if (e._turnKey && turnCollapsed[e._turnKey]) { turnCollapsed[e._turnKey] = false; needRender = true; }
    if (needRender) renderList();
  }
}

function mkSection(title, renderFn, collapsed=false) {
  const sec = document.createElement('div');
  sec.className = 'section';
  const hdr = document.createElement('div');
  hdr.className = 'sec-hdr';
  hdr.innerHTML = `<span class="sec-title">${title}</span><span class="sec-toggle">${collapsed?'展开':'收起'}</span>`;
  const body = document.createElement('div');
  body.className = 'sec-body' + (collapsed?' hidden':'');
  renderFn(body);
  hdr.onclick = () => {
    const h = body.classList.toggle('hidden');
    hdr.querySelector('.sec-toggle').textContent = h ? '展开' : '收起';
  };
  sec.appendChild(hdr); sec.appendChild(body);
  return sec;
}

function renderDetail(e) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '';

  // Meta header
  const typeCls = ['user','assistant','system','attachment'].includes(e.type) ? `type-${e.type}` : 'type-other';
  const meta = document.createElement('div');
  meta.className = 'detail-meta';
  meta.innerHTML =
    `<span class="detail-type"><span class="type-badge ${typeCls}">${esc(e.type||'?')}</span></span>` +
    (e.timestamp ? `<span class="detail-ts">${esc(fmtTs(e.timestamp))}</span>` : '') +
    (e.uuid ? `<span class="detail-uuid">${esc(e.uuid)}</span>` : '') +
    (e._source!=='main' ? `<span class="badge">${esc(e._source)}${e._agentDesc ? ': '+esc(trunc(e._agentDesc,30)) : ''}</span>` : '');
  panel.appendChild(meta);

  // ── user entry ──────────────────────────────────────────────────────────
  if (e.type === 'user') {
    // 日志元数据 — top, default expanded
    panel.appendChild(mkSection('日志元数据', body => {
      body.innerHTML = `<div class="info-grid">
        <div class="ig-k">uuid</div><div class="ig-v">${esc(e.uuid||'')}</div>
        <div class="ig-k">parentUuid</div><div class="ig-v">${esc(e.parentUuid||'')}</div>
        <div class="ig-k">promptId</div><div class="ig-v">${esc(e.promptId||'')}</div>
        <div class="ig-k">sessionId</div><div class="ig-v">${esc(e.sessionId||'')}</div>
        <div class="ig-k">permissionMode</div><div class="ig-v">${esc(e.permissionMode||'')}</div>
        <div class="ig-k">cwd</div><div class="ig-v">${esc(e.cwd||'')}</div>
        <div class="ig-k">version</div><div class="ig-v">${esc(e.version||'')}</div>
      </div>`;
    }, false));  // default expanded

    const c = e.message?.content;
    if (typeof c === 'string') {
      { const s = mkSection('消息内容', body => {
        body.classList.add('content-bg');
        const d = document.createElement('div');
        d.className = 'md-view'; d.innerHTML = renderMarkdown(c);
        body.appendChild(d);
      }, false); panel.appendChild(s); }
    } else if (Array.isArray(c)) {
      const texts = c.filter(b => b.type==='text' && !b.text?.startsWith('<system-reminder') && !b.text?.startsWith('<local-command'));
      const sysTexts = c.filter(b => b.type==='text' && (b.text?.startsWith('<system-reminder') || b.text?.startsWith('<local-command')));
      const toolResults = c.filter(b => b.type==='tool_result');
      const images = c.filter(b => b.type==='image');

      if (texts.length) {
        const s = mkSection(`用户文本 (${texts.length})`, body => {
          body.classList.add('content-bg');
          for (const b of texts) {
            const d = document.createElement('div');
            d.className = 'md-view'; d.innerHTML = renderMarkdown(b.text);
            body.appendChild(d);
          }
        }, false);  // default expanded
        panel.appendChild(s);
      }
      if (images.length) {
        const s = mkSection(`图片 (${images.length})`, body => {
          body.classList.add('content-bg');
          for (const b of images) {
            const src = b.source?.type === 'base64'
              ? `data:${b.source.media_type};base64,${b.source.data}`
              : b.source?.url || '';
            if (!src) return;
            const img = document.createElement('img');
            img.src = src;
            img.style.cssText = 'max-width:100%;max-height:400px;border-radius:4px;margin:4px 0;display:block';
            body.appendChild(img);
          }
        }, false);  // default expanded
        panel.appendChild(s);
      }
      if (toolResults.length) {
        const s = mkSection(`Tool Results (${toolResults.length})`, body => {
          body.classList.add('content-bg');
          for (const b of toolResults) {
            const row = document.createElement('div');
            row.className = 'tool-row';
            row.style.flexDirection = 'column';
            const errMark = b.is_error ? ' <span style="color:#f85149">error</span>' : '';
            const hdr = document.createElement('div');
            hdr.style.cssText = 'font-size:11px;color:#79c0ff;font-weight:600;margin-bottom:4px';
            hdr.innerHTML = `${esc(b.tool_use_id||'')}${errMark}`;
            row.appendChild(hdr);

            const rawContent = typeof b.content === 'string' ? b.content : JSON.stringify(b.content, null, 2);
            let parsed;
            try { parsed = JSON.parse(rawContent); } catch { parsed = undefined; }

            const contentEl = document.createElement('div');
            if (parsed !== undefined) {
              contentEl.className = 'raw-json';
              contentEl.style.cssText = 'max-height:300px;overflow-y:auto;margin:0';
              contentEl.innerHTML = syntaxHighlightJson(parsed);
            } else {
              contentEl.className = 'md-view';
              contentEl.innerHTML = renderMarkdown(rawContent);
            }
            row.appendChild(contentEl);
            body.appendChild(row);
          }
        }, false);  // default expanded
        panel.appendChild(s);
      }
      if (sysTexts.length) {
        panel.appendChild(mkSection(`System Reminders (${sysTexts.length})`, body => {
          for (const b of sysTexts) {
            const d = document.createElement('div');
            d.className = 'content-text'; d.style.fontSize='11px'; d.style.color='#6e7681';
            d.textContent = trunc(b.text, 500);
            body.appendChild(d);
          }
        }, true));
      }
    }
  }

  // ── assistant entry ──────────────────────────────────────────────────────
  else if (e.type === 'assistant') {
    const msg = e.message || {};

    // 日志元数据 — top, default expanded
    const _rawDate = e.timestamp ? e.timestamp.slice(0, 10) : '';
    const _rawSession = e.sessionId || '';
    const _rawHref = msg.id
      ? `req-resp.html?q=${encodeURIComponent(msg.id)}${_rawSession ? '&session='+encodeURIComponent(_rawSession) : ''}${_rawDate ? '&date='+encodeURIComponent(_rawDate) : ''}`
      : '';
    const metaTitle = '日志元数据' + (_rawHref ? ` <a href="${_rawHref}" target="_blank" onclick="event.stopPropagation()" style="font-size:10px;color:#58a6ff;text-decoration:none;padding:1px 6px;border:1px solid #30363d;border-radius:3px;white-space:nowrap;font-weight:normal;margin-left:6px">原始数据 ↗</a>` : '');
    panel.appendChild(mkSection(metaTitle, body => {
      body.innerHTML = `<div class="info-grid">
        <div class="ig-k">uuid</div><div class="ig-v">${esc(e.uuid||'')}</div>
        <div class="ig-k">parentUuid</div><div class="ig-v">${esc(e.parentUuid||'')}</div>
        <div class="ig-k">message.id</div><div class="ig-v">${esc(msg.id||'')}</div>
        <div class="ig-k">model</div><div class="ig-v">${esc(msg.model||'')}</div>
        <div class="ig-k">stop_reason</div><div class="ig-v">${esc(msg.stop_reason||'')}</div>
        <div class="ig-k">isSidechain</div><div class="ig-v">${e.isSidechain}</div>
      </div>`;
      if (msg.usage) {
        const u = msg.usage;
        const chips = document.createElement('div');
        chips.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:8px';
        for (const [k,v] of Object.entries(u)) {
          chips.innerHTML += `<span style="background:#21262d;border-radius:4px;padding:2px 8px;font-size:11px;color:#8b949e">${esc(k)} <b style="color:#e1e4e8">${v?.toLocaleString?.()??v}</b></span>`;
        }
        body.appendChild(chips);
      }
    }, false));  // default expanded

    const c = e.message?.content || [];
    const texts = c.filter(b=>b.type==='text');
    const toolUses = c.filter(b=>b.type==='tool_use');

    if (texts.length) {
      const s = mkSection(`文本回复 (${texts.length})`, body => {
        body.classList.add('content-bg');
        for (const b of texts) {
          const d = document.createElement('div');
          d.className = 'md-view'; d.innerHTML = renderMarkdown(b.text);
          body.appendChild(d);
        }
      }, false);  // default expanded
      panel.appendChild(s);
    }
    if (toolUses.length) {
      panel.appendChild(mkSection(`Tool Calls (${toolUses.length})`, body => {
        for (const b of toolUses) {
          const row = document.createElement('div');
          row.className = 'tool-row';
          row.innerHTML = `<span class="tool-name">${esc(b.name)}</span>`;
          const inp = document.createElement('span');
          inp.className = 'tool-input';
          inp.textContent = JSON.stringify(b.input, null, 2);
          row.appendChild(inp);
          body.appendChild(row);
        }
      }, toolUses.length > 3));
    }
  }

  // ── system entry ─────────────────────────────────────────────────────────
  else if (e.type === 'system') {
    panel.appendChild(mkSection('System 信息', body => {
      body.innerHTML = `<div class="info-grid">
        <div class="ig-k">subtype</div><div class="ig-v">${esc(e.subtype||'')}</div>
        <div class="ig-k">level</div><div class="ig-v">${esc(e.level||'')}</div>
        <div class="ig-k">stopReason</div><div class="ig-v">${esc(e.stopReason||'')}</div>
        <div class="ig-k">hookCount</div><div class="ig-v">${esc(e.hookCount??'')}</div>
      </div>`;
    }));
  }

  // ── attachment ────────────────────────────────────────────────────────────
  else if (e.type === 'attachment') {
    panel.appendChild(mkSection('Attachment', body => {
      const att = e.attachment || {};
      body.innerHTML = `<div class="info-grid">
        <div class="ig-k">type</div><div class="ig-v">${esc(att.type||'')}</div>
        <div class="ig-k">hookName</div><div class="ig-v">${esc(att.hookName||'')}</div>
        <div class="ig-k">hookEvent</div><div class="ig-v">${esc(att.hookEvent||'')}</div>
      </div>`;
      if (att.stdout) {
        const pre = document.createElement('div');
        pre.className = 'raw-json'; pre.style.marginTop = '8px';
        let stdoutDisplay = trunc(att.stdout, 2000);
        try {
          pre.innerHTML = syntaxHighlightJson(JSON.parse(att.stdout));
        } catch {
          pre.textContent = stdoutDisplay;
        }
        body.appendChild(pre);
      }
    }));
  }

  // ── Raw JSON (always, default expanded, syntax highlighted) ──────────────
  const rawCopy = Object.assign({}, e);
  delete rawCopy._source; delete rawCopy._agentDesc;
  delete rawCopy._gid; delete rawCopy._idx; delete rawCopy._lineNo; delete rawCopy._fileLine;
  panel.appendChild(mkSection('原始 JSON', body => {
    const pre = document.createElement('div');
    pre.className = 'raw-json';
    pre.innerHTML = syntaxHighlightJson(rawCopy);
    body.appendChild(pre);
  }, false));  // default expanded
}

// ── Export ───────────────────────────────────────────────────────────────
let exportCurrentSessionId = '';

function fmtExportFilename(sessionIds) {
  const ids = Array.isArray(sessionIds) ? sessionIds : (sessionIds ? [sessionIds] : []);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  if (ids.length > 1) return `export-${ts}-${ids.length}-sessions.tar.gz`;
  const shortId = ids.length === 1 ? `-${ids[0].slice(0, 8)}` : '';
  return `export-${ts}${shortId}.tar.gz`;
}

function selectedExportSessionIds() {
  return Array.from(document.querySelectorAll('#exportSessionList input[type=checkbox]:checked'))
    .map(input => input.value);
}

function setExportSessionControlsDisabled(disabled) {
  document.querySelectorAll('#exportSessionList input, #exportSelectCurrentBtn, #exportSelectAllBtn, #exportClearBtn')
    .forEach(el => { el.disabled = disabled; });
}

function updateExportSessionSelection() {
  const sessionIds = selectedExportSessionIds();
  document.getElementById('exportFilename').value = fmtExportFilename(sessionIds);
  document.getElementById('exportSessionCount').textContent = `已选择 ${sessionIds.length} 个 session`;
  document.getElementById('exportConfirmBtn').disabled = sessionIds.length === 0;
}

function selectCurrentExportSession() {
  document.querySelectorAll('#exportSessionList input[type=checkbox]').forEach(input => {
    input.checked = input.value === exportCurrentSessionId;
  });
  updateExportSessionSelection();
}

function selectAllExportSessions() {
  document.querySelectorAll('#exportSessionList input[type=checkbox]').forEach(input => {
    input.checked = true;
  });
  updateExportSessionSelection();
}

function clearExportSessions() {
  document.querySelectorAll('#exportSessionList input[type=checkbox]').forEach(input => {
    input.checked = false;
  });
  updateExportSessionSelection();
}

function appendExportSessionRow(container, projectDir, session, selected) {
  const label = document.createElement('label');
  label.className = 'export-session-row';

  const input = document.createElement('input');
  input.type = 'checkbox';
  input.value = session.id;
  input.checked = selected;
  input.onchange = updateExportSessionSelection;

  const text = document.createElement('div');
  const main = document.createElement('div');
  main.className = 'export-session-main';
  main.textContent = `${session.id.slice(0, 8)}...`;
  const meta = document.createElement('div');
  meta.className = 'export-session-meta';
  meta.textContent = `${projectDir} ${((session.lastTimestamp || '').slice(0, 16).replace('T', ' ') || '-')}`;
  text.appendChild(main);
  text.appendChild(meta);

  label.appendChild(input);
  label.appendChild(text);
  container.appendChild(label);
}

async function openExportModal() {
  const currentSessionId = document.getElementById('sessionSel').value;
  exportCurrentSessionId = currentSessionId;

  const list = document.getElementById('exportSessionList');
  list.innerHTML = '';
  try {
    const projects = await fetch(`${apiBase()}/api/projects`).then(r => r.json());
    for (const proj of projects) {
      const header = document.createElement('div');
      header.className = 'export-session-project';
      header.textContent = proj.projectDir;
      list.appendChild(header);
      for (const s of proj.sessions) {
        appendExportSessionRow(list, proj.projectDir, s, s.id === currentSessionId);
      }
    }
  } catch {
    // 回退：只显示当前 session
    if (currentSessionId) {
      appendExportSessionRow(list, '-', {id: currentSessionId, lastTimestamp: ''}, true);
    }
  }

  setExportSessionControlsDisabled(false);
  document.getElementById('exportFilename').disabled = false;
  document.getElementById('exportStatus').textContent = '';
  document.getElementById('exportImportCmd').style.display = 'none';
  document.getElementById('chkSubagentLogs').disabled = false;
  document.getElementById('chkSubagentLogs').checked = true;
  document.getElementById('chkReqResp').disabled = false;
  document.getElementById('chkReqResp').checked = true;
  const btn = document.getElementById('exportConfirmBtn');
  btn.disabled = false;
  btn.textContent = '导出并下载';
  btn.onclick = doExport;
  updateExportSessionSelection();
  document.getElementById('exportOverlay').classList.add('open');
}

function closeExportModal() {
  document.getElementById('exportOverlay').classList.remove('open');
}

function onExportOverlayClick(e) {
  if (e.target === document.getElementById('exportOverlay')) closeExportModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeExportModal();
});

async function doExport() {
  const sessionIds = selectedExportSessionIds();
  if (!sessionIds.length) return;
  const filename = (document.getElementById('exportFilename').value.trim() || fmtExportFilename(sessionIds))
    .replace(/[/\\:*?"<>|]/g, '_');
  const confirmBtn = document.getElementById('exportConfirmBtn');
  const statusEl = document.getElementById('exportStatus');

  const included = ['claudeLogs'];
  if (document.getElementById('chkSubagentLogs').checked) included.push('subagentLogs');
  if (document.getElementById('chkReqResp').checked) included.push('reqResp');

  statusEl.textContent = '';
  statusEl.style.color = '#8b949e';
  confirmBtn.disabled = true;
  confirmBtn.textContent = '生成中…';
  confirmBtn.onclick = null;

  try {
    const includeParam = encodeURIComponent(included.join(','));
    const url = `${apiBase()}/api/export?sessions=${encodeURIComponent(sessionIds.join(','))}&filename=${encodeURIComponent(filename)}&include=${includeParam}`;
    const resp = await fetch(url);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const blob = await resp.blob();

    // 触发浏览器下载
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 10000);

    // 成功：锁定表单，展示结果
    setExportSessionControlsDisabled(true);
    document.getElementById('exportFilename').disabled = true;
    document.getElementById('chkSubagentLogs').disabled = true;
    document.getElementById('chkReqResp').disabled = true;

    statusEl.style.color = '#56d364';
    statusEl.textContent = `✓ 诊断包导出成功，文件已下载至浏览器默认下载文件夹`;

    document.getElementById('exportImportCmdText').textContent = `ccwhat import ~/Downloads/${filename} --open`;
    document.getElementById('exportImportCmd').style.display = '';
    document.getElementById('exportCopyBtn').textContent = '复制导入命令';

    confirmBtn.textContent = '完成';
    confirmBtn.disabled = false;
    confirmBtn.onclick = closeExportModal;

  } catch (e) {
    statusEl.style.color = '#f85149';
    statusEl.textContent = `导出失败：${e.message}`;
    confirmBtn.textContent = '导出并下载';
    confirmBtn.disabled = false;
    confirmBtn.onclick = doExport;
  }
}

function copyImportCmd() {
  const text = document.getElementById('exportImportCmdText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('exportCopyBtn');
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = '复制导入命令'; }, 1500);
  });
}

// ── Init ────────────────────────────────────────────────────────────────
init();
</script>

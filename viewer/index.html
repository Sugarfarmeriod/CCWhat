<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ccwhat · Session Viewer</title>
<!-- Anti-FOUC: apply theme before first paint -->
<script>
(function(){
  var s = localStorage.getItem('ccwhat-theme');
  var d = s || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', d);
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Global transitions (theme switch smoothness) ── */
*, *::before, *::after {
  transition: background-color 0.25s ease, color 0.2s ease,
              border-color 0.2s ease, box-shadow 0.2s ease;
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}

/* ── Token system ── */
:root {
  --bg-base:      #ffffff;
  --bg-surface:   #f5f5f7;
  --bg-elevated:  #ffffff;
  --border:       rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --accent:       #0071e3;
  --accent-hover: #0077ed;
  --success:      #30d158;
  --warning:      #ff9f0a;
  --danger:       #ff3b30;
  --font-sans:    -apple-system, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
  --font-mono:    "SF Mono", ui-monospace, "Cascadia Code", monospace;
  --radius-sm:    6px;
  --radius-md:    10px;
  --radius-lg:    14px;
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --bg-base:      #0d0d0d;
  --bg-surface:   #161616;
  --bg-elevated:  #1e1e1e;
  --border:       rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text-primary: #f0f0f0;
  --text-secondary: #8a8a8a;
  --text-tertiary: #555555;
  --accent:       #57b5ff;
  --accent-hover: #7ac4ff;
  --success:      #30d158;
  --warning:      #ff9f0a;
  --danger:       #ff453a;
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:    0 4px 16px rgba(0,0,0,0.4), 0 1px 4px rgba(0,0,0,0.3);
}

body {
  font-family: var(--font-sans);
  background: var(--bg-surface);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.2s, color 0.2s;
}

/* ── Theme toggle ── */
.theme-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-left: 4px;
  transition: background 0.2s, border-color 0.2s, transform 0.25s ease, color 0.15s;
  color: var(--text-secondary);
}
.theme-btn:hover {
  background: var(--bg-elevated);
  border-color: var(--border-strong);
  transform: rotate(22deg) scale(1.08);
  color: var(--text-primary);
}

/* ── Top bar ── */
.topbar {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.topbar h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  letter-spacing: -0.01em;
}
.adv-wrap { position: relative; }
.adv-btn {
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s, color 0.1s;
}
.adv-btn:hover { background: var(--bg-base); color: var(--text-primary); }
.adv-panel {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  z-index: 100;
  min-width: 260px;
  box-shadow: var(--shadow-md);
}
.adv-panel.open { display: block; }
.adv-panel label {
  font-size: 11px;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 4px;
}
.adv-panel .field { width: 100%; }
.topbar select {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: border-color 0.15s;
}
.topbar select:focus { outline: none; border-color: var(--accent); }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 5px 14px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn:hover { background: var(--accent-hover); }
.btn:disabled {
  background: var(--bg-surface);
  color: var(--text-tertiary);
  cursor: default;
}
.btn-secondary {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 14px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-secondary:hover { background: var(--bg-elevated); }
.btn-export {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 5px 14px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-export:hover { background: var(--accent-hover); }
.btn-export:disabled { background: var(--bg-surface); color: var(--text-tertiary); cursor: default; }
.api-url {
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  width: 220px;
  font-family: var(--font-sans);
}
.field {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  font-size: 13px;
  font-family: var(--font-sans);
  transition: border-color 0.15s;
}
.field:focus { outline: none; border-color: var(--accent); }

/* ── Stats bar ── */
.statsbar {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  flex-shrink: 0;
  min-height: 32px;
  align-items: center;
}
.stat { font-size: 12px; color: var(--text-secondary); }
.stat span { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }

/* ── Tab bar ── */
.tabbar {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  gap: 0;
  flex-shrink: 0;
  overflow-x: auto;
}
.tab {
  padding: 9px 16px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text-secondary);
  white-space: nowrap;
  user-select: none;
  transition: color 0.15s;
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--accent); font-weight: 500; }
.tab-badge {
  display: inline-block;
  background: var(--bg-surface);
  color: var(--text-secondary);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 11px;
  margin-left: 5px;
}

/* ── Panels ── */
.panels { flex: 1; overflow: hidden; position: relative; }
.panel {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--bg-base);
}
.panel.hidden { display: none; }

/* ── Placeholder ── */
.placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
  color: var(--text-tertiary);
}
.placeholder svg { opacity: 0.3; }

/* ── Message bubbles ── */
.turn { display: flex; flex-direction: column; max-width: 100%; }
.turn.user { align-items: flex-end; }
.turn.assistant { align-items: flex-start; }

.bubble {
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  max-width: 80%;
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}
.turn.user .bubble {
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 4px;
  max-width: 72%;
}
.turn.assistant .bubble {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
  max-width: 88%;
}
.turn-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin: 3px 6px;
  font-variant-numeric: tabular-nums;
}

/* ── Tool call cards ── */
.tool-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-top: 8px;
  overflow: hidden;
  font-size: 12px;
}
.tool-card.error { border-color: var(--danger); }
.tool-header {
  background: var(--bg-surface);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
  border-left: 3px solid var(--accent);
}
.tool-name {
  font-weight: 600;
  color: var(--accent);
  font-size: 12px;
  font-family: var(--font-mono);
}
.tool-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.tool-card.error .tool-badge { background: color-mix(in srgb, var(--danger) 10%, transparent); color: var(--danger); }
.tool-section { padding: 8px 12px; border-top: 1px solid var(--border); }
.tool-section-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.tool-content {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
}
.tool-content.collapsed { max-height: 60px; overflow: hidden; }
.expand-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 11px;
  font-family: var(--font-sans);
  cursor: pointer;
  padding: 2px 0;
  margin-top: 4px;
  display: block;
}
.expand-btn:hover { text-decoration: underline; }

/* ── Text blocks ── */
.text-block { white-space: pre-wrap; }
.text-block pre {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin: 6px 0;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 11px;
}
.text-block code {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
}

/* ── HTTP lookup button ── */
.http-btn {
  position: absolute;
  top: 6px;
  right: 8px;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  font-size: 10px;
  padding: 2px 7px;
  cursor: pointer;
  white-space: nowrap;
  opacity: 0.75;
  transition: opacity 0.15s, background 0.15s;
  font-family: var(--font-sans);
}
.http-btn:hover { opacity: 1; background: color-mix(in srgb, var(--accent) 20%, transparent); }

/* ── HTTP Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  width: min(800px, 95vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.modal-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.modal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
.modal-close {
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--text-primary); }
.modal-body { overflow-y: auto; padding: 14px 18px; flex: 1; }
.http-record {
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
  overflow: hidden;
  font-size: 12px;
}
.http-record-header {
  background: var(--bg-surface);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.http-record-ts { color: var(--text-secondary); font-size: 11px; }
.http-record-model { color: var(--accent); font-weight: 600; }
.http-record-section { padding: 8px 12px; border-top: 1px solid var(--border); }
.http-record-label {
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.http-record-content {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
}
.usage-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.usage-chip {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px 8px;
  font-size: 11px;
  color: var(--text-secondary);
}
.usage-chip span { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }
.no-records { color: var(--text-tertiary); font-size: 13px; padding: 20px 0; text-align: center; }

/* ── Export modal ── */
.export-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.export-overlay.open { display: flex; }
.export-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  width: min(480px, 95vw);
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.export-card-hdr {
  background: var(--bg-surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.export-card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
.export-card-close {
  background: none;
  border: none;
  color: var(--text-tertiary);
  font-size: 16px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.export-card-close:hover { color: var(--text-primary); }
.export-card-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.export-field-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.export-field-value {
  font-size: 12px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  word-break: break-all;
}
.export-checklist { display: flex; flex-direction: column; gap: 6px; }
.export-checklist-item { font-size: 12px; color: var(--success); }
.export-card-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.export-btn-cancel {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 16px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: background 0.15s;
}
.export-btn-cancel:hover { background: var(--bg-elevated); }
.export-btn-confirm {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  padding: 6px 16px;
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: background 0.15s;
}
.export-btn-confirm:hover { background: var(--accent-hover); }
.export-btn-confirm:disabled { background: var(--bg-surface); color: var(--text-tertiary); cursor: default; }
.export-status { font-size: 11px; color: var(--text-secondary); margin-top: 2px; min-height: 16px; }

/* ── Spinner ── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { color: var(--danger); font-size: 13px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .topbar { flex-wrap: wrap; }
  .topbar select { min-width: 120px; }
}
</style>
</head>
<body data-od-id="body">

<!-- Top bar -->
<div class="topbar" data-od-id="topbar">
  <h1>ccwhat <span id="agentBadge" style="font-size:12px;color:var(--text-secondary);font-weight:400;margin-left:4px">claude</span></h1>
  <div class="adv-wrap" id="advWrap">
    <button class="adv-btn" onclick="toggleAdv()">⚙ 高级设置</button>
    <div class="adv-panel" id="advPanel">
      <label>API URL</label>
      <input class="field" id="apiUrl" type="text" value="" placeholder="默认: 当前页面地址">
    </div>
  </div>
  <select id="projectSel" title="Project">
    <option value="">— select project —</option>
  </select>
  <select id="sessionSel" title="Session">
    <option value="">— select session —</option>
  </select>
  <button class="btn" id="loadBtn" onclick="loadSession()">Load</button>
  <button class="btn-secondary" onclick="fetchProjects()">Refresh</button>
  <button class="btn-export" id="exportBtn" onclick="openExportModal()" disabled title="导出当前 session 的日志和请求响应">导出</button>
  <button class="theme-btn" onclick="toggleTheme()" title="切换主题" id="themeBtn">☾</button>
</div>

<!-- Export modal -->
<div class="export-overlay" id="exportOverlay" onclick="onExportOverlayClick(event)">
  <div class="export-card">
    <div class="export-card-hdr">
      <span class="export-card-title">导出对话记录</span>
      <button class="export-card-close" onclick="closeExportModal()">✕</button>
    </div>
    <div class="export-card-body">
      <div>
        <div class="export-field-label">Session</div>
        <div class="export-field-value" id="exportSessionId">—</div>
      </div>
      <div>
        <div class="export-field-label">文件名</div>
        <input class="field" id="exportFilename" type="text" style="width:100%;font-size:12px"
               placeholder="export-YYYYMMDD-HHmmss.tar.gz">
      </div>
      <div>
        <div class="export-field-label">包含内容</div>
        <div class="export-checklist">
          <div class="export-checklist-item">✓ Claude Code 主日志</div>
          <div class="export-checklist-item">✓ Subagent 日志（如有）</div>
          <div class="export-checklist-item">✓ 原始请求响应（如有）</div>
        </div>
      </div>
      <div class="export-status" id="exportStatus"></div>
    </div>
    <div class="export-card-footer">
      <button class="export-btn-cancel" onclick="closeExportModal()">取消</button>
      <button class="export-btn-confirm" id="exportConfirmBtn" onclick="doExport()">选择位置并导出</button>
    </div>
  </div>
</div>

<!-- Stats bar -->
<div class="statsbar" id="statsbar">
  <span class="stat" style="color:var(--text-tertiary)">Load a session to begin</span>
</div>

<!-- Tab bar -->
<div class="tabbar" id="tabbar"></div>

<!-- HTTP lookup modal -->
<div class="modal-overlay hidden" id="httpModalOverlay" onclick="closeHttpModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="httpModalTitle">HTTP Requests</div>
      <button class="modal-close" onclick="closeHttpModal()">×</button>
    </div>
    <div class="modal-body" id="httpModalBody"></div>
  </div>
</div>

<!-- Panels -->
<div class="panels" id="panels" data-od-id="panels">
  <div class="panel" id="welcomePanel">
    <div class="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <div style="font-size:14px;color:var(--text-secondary)">Select a project and session, then click Load</div>
    </div>
  </div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ccwhat-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '☾';
}
// Init button icon
(function(){
  const t = document.documentElement.getAttribute('data-theme');
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
})();

// ── State ──────────────────────────────────────────────────────────────────
let allProjects = [];
let currentData = null;
let activeTab = 'main';

// ── Utilities ──────────────────────────────────────────────────────────────
function toggleAdv() {
  document.getElementById('advPanel').classList.toggle('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('advWrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('advPanel').classList.remove('open');
  }
});

function apiBase() {
  return (document.getElementById('apiUrl').value || window.location.origin).replace(/\/$/, '');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtTime(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleTimeString(); } catch { return ''; }
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max) + '…' : s;
}

function renderMarkdown(text) {
  if (!text) return '';
  let s = escHtml(text);
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) => `<pre>${code}</pre>`);
  s = s.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
  return s;
}

// ── Project / Session selectors ────────────────────────────────────────────
async function fetchProjects() {
  try {
    const resp = await fetch(`${apiBase()}/api/projects`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    allProjects = await resp.json();
    const agentBadge = document.getElementById('agentBadge');
    if (allProjects.length > 0 && allProjects[0].agent) {
      agentBadge.textContent = allProjects[0].agent;
    } else {
      agentBadge.textContent = 'claude';
    }
    const sel = document.getElementById('projectSel');
    sel.innerHTML = '<option value="">— select project —</option>';
    for (const p of allProjects) {
      const opt = document.createElement('option');
      opt.value = p.projectDir;
      opt.textContent = p.projectDir;
      sel.appendChild(opt);
    }
  } catch (e) {
    setStats(`<span class="error-msg">Cannot reach API: ${escHtml(e.message)}. Is the server running?</span>`);
    document.getElementById('agentBadge').textContent = '?';
  }
}

document.getElementById('projectSel').addEventListener('change', function() {
  const proj = allProjects.find(p => p.projectDir === this.value);
  const sel = document.getElementById('sessionSel');
  sel.innerHTML = '<option value="">— select session —</option>';
  if (proj) {
    for (const sid of proj.sessions) {
      const opt = document.createElement('option');
      opt.value = sid;
      opt.textContent = sid;
      sel.appendChild(opt);
    }
  }
});

// ── Load session ───────────────────────────────────────────────────────────
async function loadSession() {
  const sessionId = document.getElementById('sessionSel').value;
  if (!sessionId) { alert('Please select a session first.'); return; }

  setStats('<div class="spinner"></div>');
  document.getElementById('tabbar').innerHTML = '';
  document.getElementById('panels').innerHTML = '';

  try {
    const resp = await fetch(`${apiBase()}/api/session/${sessionId}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    currentData = await resp.json();
    renderAll(currentData);
    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.disabled = false;
  } catch (e) {
    setStats(`<span class="error-msg">Error: ${escHtml(e.message)}</span>`);
  }
}

// ── Render everything ──────────────────────────────────────────────────────
function renderAll(data) {
  const tabbar = document.getElementById('tabbar');
  const panels = document.getElementById('panels');
  tabbar.innerHTML = '';
  panels.innerHTML = '';

  const mainTurns = buildTurns(data.main, false, data.sessionId);
  addTab(tabbar, panels, 'main', 'Main Session', mainTurns.length, true);
  addPanel(panels, 'main', mainTurns);
  showStats(data.main);

  for (const sa of data.subagents || []) {
    const label = sa.meta?.description
      ? truncate(sa.meta.description, 22)
      : sa.agentId.slice(0, 8);
    const saId = `sa-${sa.agentId}`;
    const saTurns = buildTurns(sa.entries, true, data.sessionId);
    addTab(tabbar, panels, saId, label, saTurns.length, false, sa.meta?.agentType);
    addPanel(panels, saId, saTurns);
  }

  showStats(data.main);
  switchTab('main');
}

// ── Tab management ─────────────────────────────────────────────────────────
function addTab(tabbar, panels, id, label, count, active, agentType) {
  const tab = document.createElement('div');
  tab.className = 'tab' + (active ? ' active' : '');
  tab.dataset.tab = id;
  tab.innerHTML = escHtml(label) +
    (agentType ? ` <span class="tab-badge">${escHtml(agentType)}</span>` : '') +
    ` <span class="tab-badge">${count}</span>`;
  tab.onclick = () => switchTab(id);
  tabbar.appendChild(tab);
}

function addPanel(panels, id, turns) {
  const panel = document.createElement('div');
  panel.className = 'panel hidden';
  panel.id = `panel-${id}`;
  if (turns.length === 0) {
    panel.innerHTML = '<div class="placeholder"><div>No messages</div></div>';
  } else {
    for (const turn of turns) {
      panel.appendChild(renderTurn(turn));
    }
  }
  panels.appendChild(panel);
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('hidden', p.id !== `panel-${id}`));

  if (!currentData) return;
  if (id === 'main') {
    showStats(currentData.main);
  } else {
    const agentId = id.replace(/^sa-/, '');
    const sa = currentData.subagents?.find(s => s.agentId === agentId);
    if (sa) showStats(sa.entries, sa.meta);
  }
}

// ── Stats ──────────────────────────────────────────────────────────────────
function showStats(entries, meta) {
  const stats = calcStats(entries);
  const metaStr = meta?.description
    ? `<span class="stat">${escHtml(meta.description)}</span> · ` : '';
  const agentStr = meta?.agentType
    ? `<span class="stat">type: <span>${escHtml(meta.agentType)}</span></span>` : '';
  setStats(
    metaStr +
    `<span class="stat">user: <span>${stats.userMsgs}</span></span>` +
    `<span class="stat">assistant: <span>${stats.assistantMsgs}</span></span>` +
    `<span class="stat">tools: <span>${stats.toolCalls}</span></span>` +
    `<span class="stat">input_tokens: <span>${stats.inputTokens.toLocaleString()}</span></span>` +
    `<span class="stat">output_tokens: <span>${stats.outputTokens.toLocaleString()}</span></span>` +
    `<span class="stat">cache_read: <span>${stats.cacheRead.toLocaleString()}</span></span>` +
    agentStr
  );
}

function setStats(html) {
  document.getElementById('statsbar').innerHTML = html;
}

function calcStats(entries) {
  let userMsgs = 0, assistantMsgs = 0, toolCalls = 0;
  let inputTokens = 0, outputTokens = 0, cacheRead = 0;
  for (const e of entries) {
    if (e.type === 'user') {
      const c = e.message?.content;
      if (typeof c === 'string' || (Array.isArray(c) && c.some(b => b.type !== 'tool_result'))) {
        userMsgs++;
      }
    } else if (e.type === 'assistant') {
      assistantMsgs++;
      const content = e.message?.content || [];
      for (const b of content) {
        if (b.type === 'tool_use') toolCalls++;
      }
      const u = e.message?.usage || {};
      inputTokens += u.input_tokens || 0;
      outputTokens += u.output_tokens || 0;
      cacheRead += u.cache_read_input_tokens || 0;
    }
  }
  return { userMsgs, assistantMsgs, toolCalls, inputTokens, outputTokens, cacheRead };
}

// ── Build turns ────────────────────────────────────────────────────────────
function buildTurns(entries, isSubagent, sessionId) {
  const filtered = entries.filter(e => {
    if (!isSubagent && e.isSidechain) return false;
    return e.type === 'user' || e.type === 'assistant';
  });

  filtered.sort((a, b) => {
    const ta = a.timestamp || a.message?.timestamp || '';
    const tb = b.timestamp || b.message?.timestamp || '';
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });

  const toolResults = {};
  for (const e of filtered) {
    if (e.type === 'user') {
      const content = e.message?.content;
      if (Array.isArray(content)) {
        for (const b of content) {
          if (b.type === 'tool_result') {
            toolResults[b.tool_use_id] = b;
          }
        }
      }
    }
  }

  const userToMsgId = {};
  let lastUserUuid = null;
  for (const e of filtered) {
    if (e.type === 'user') {
      const content = e.message?.content;
      if (!(Array.isArray(content) && content.every(b => b.type === 'tool_result'))) {
        lastUserUuid = e.uuid;
      }
    } else if (e.type === 'assistant' && lastUserUuid) {
      const msgId = e.message?.id;
      if (msgId && !userToMsgId[lastUserUuid]) {
        userToMsgId[lastUserUuid] = msgId;
      }
    }
  }

  const turns = [];
  for (const e of filtered) {
    if (e.type === 'user') {
      const content = e.message?.content;
      if (Array.isArray(content) && content.every(b => b.type === 'tool_result')) continue;
      turns.push({
        role: 'user',
        text: typeof content === 'string' ? content : null,
        timestamp: e.timestamp,
        uuid: e.uuid || null,
        sessionId: sessionId || null,
        assistantMsgId: userToMsgId[e.uuid] || null,
      });
    } else if (e.type === 'assistant') {
      const content = e.message?.content || [];
      const textBlocks = content.filter(b => b.type === 'text').map(b => b.text);
      const toolUses = content.filter(b => b.type === 'tool_use').map(b => ({
        ...b,
        result: toolResults[b.id] || null,
      }));
      turns.push({
        role: 'assistant',
        textBlocks,
        toolUses,
        timestamp: e.timestamp,
        model: e.message?.model,
        msgId: e.message?.id || null,
        sessionId: sessionId || null,
      });
    }
  }
  return turns;
}

// ── Render turn ────────────────────────────────────────────────────────────
function renderTurn(turn) {
  const div = document.createElement('div');
  div.className = `turn ${turn.role}`;

  if (turn.role === 'user') {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<div class="text-block">${escHtml(turn.text || '')}</div>`;

    if (turn.assistantMsgId && turn.sessionId) {
      const btn = document.createElement('button');
      btn.className = 'http-btn';
      btn.textContent = '查看请求';
      btn.title = '查看该消息触发的底层 HTTP 请求';
      btn.onclick = (e) => {
        e.stopPropagation();
        fetchHttpRecords(turn.sessionId, turn.assistantMsgId, turn.text || '(no text)');
      };
      bubble.appendChild(btn);
    }

    div.appendChild(bubble);
    if (turn.timestamp) {
      const meta = document.createElement('div');
      meta.className = 'turn-meta';
      meta.textContent = fmtTime(turn.timestamp);
      div.appendChild(meta);
    }
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.position = 'relative';

    if (turn.msgId && turn.sessionId) {
      const btn = document.createElement('button');
      btn.className = 'http-btn';
      btn.textContent = '查看请求';
      btn.title = '查看该助手消息对应的底层 HTTP 请求';
      btn.onclick = (e) => {
        e.stopPropagation();
        fetchHttpRecords(turn.sessionId, turn.msgId, turn.textBlocks[0] || '(assistant)');
      };
      bubble.appendChild(btn);
    }

    for (const text of turn.textBlocks) {
      const tb = document.createElement('div');
      tb.className = 'text-block';
      tb.innerHTML = renderMarkdown(text);
      bubble.appendChild(tb);
    }

    for (const tool of turn.toolUses) {
      bubble.appendChild(renderToolCard(tool));
    }

    div.appendChild(bubble);

    if (turn.timestamp || turn.model) {
      const meta = document.createElement('div');
      meta.className = 'turn-meta';
      meta.textContent = [fmtTime(turn.timestamp), turn.model].filter(Boolean).join(' · ');
      div.appendChild(meta);
    }
  }

  return div;
}

// ── Render tool card ───────────────────────────────────────────────────────
function renderToolCard(tool) {
  const isError = tool.result?.is_error === true;
  const card = document.createElement('div');
  card.className = 'tool-card' + (isError ? ' error' : '');

  const header = document.createElement('div');
  header.className = 'tool-header';
  const badge = isError ? '<span class="tool-badge">error</span>' : '<span class="tool-badge">tool</span>';
  header.innerHTML = `<span class="tool-name">${escHtml(tool.name)}</span>${badge}`;
  header.onclick = () => inputSection.classList.toggle('hidden');
  card.appendChild(header);

  const inputSection = document.createElement('div');
  inputSection.className = 'tool-section';
  const inputStr = JSON.stringify(tool.input, null, 2);
  const inputTruncated = inputStr.length > 200;

  const inputLabel = document.createElement('div');
  inputLabel.className = 'tool-section-label';
  inputLabel.textContent = 'Input';
  inputSection.appendChild(inputLabel);

  const inputContent = document.createElement('div');
  inputContent.className = 'tool-content' + (inputTruncated ? ' collapsed' : '');
  inputContent.textContent = inputStr;
  inputSection.appendChild(inputContent);

  if (inputTruncated) {
    const expandBtn = document.createElement('button');
    expandBtn.className = 'expand-btn';
    expandBtn.textContent = 'Show full input';
    expandBtn.onclick = () => {
      inputContent.classList.toggle('collapsed');
      expandBtn.textContent = inputContent.classList.contains('collapsed') ? 'Show full input' : 'Collapse';
    };
    inputSection.appendChild(expandBtn);
  }
  card.appendChild(inputSection);

  if (tool.result) {
    const resultSection = document.createElement('div');
    resultSection.className = 'tool-section';

    const resultLabel = document.createElement('div');
    resultLabel.className = 'tool-section-label';
    resultLabel.textContent = isError ? 'Error' : 'Result';
    resultSection.appendChild(resultLabel);

    const resultStr = typeof tool.result.content === 'string'
      ? tool.result.content
      : JSON.stringify(tool.result.content, null, 2);
    const resultTruncated = resultStr.length > 300;

    const resultContent = document.createElement('div');
    resultContent.className = 'tool-content' + (resultTruncated ? ' collapsed' : '');
    resultContent.style.color = isError ? 'var(--danger)' : '';
    resultContent.textContent = resultStr;
    resultSection.appendChild(resultContent);

    if (resultTruncated) {
      const expandBtn = document.createElement('button');
      expandBtn.className = 'expand-btn';
      expandBtn.textContent = 'Show full result';
      expandBtn.onclick = () => {
        resultContent.classList.toggle('collapsed');
        expandBtn.textContent = resultContent.classList.contains('collapsed') ? 'Show full result' : 'Collapse';
      };
      resultSection.appendChild(expandBtn);
    }
    card.appendChild(resultSection);
  }

  return card;
}

// ── HTTP lookup ────────────────────────────────────────────────────────────
async function fetchHttpRecords(sessionId, messageId, msgText) {
  const overlay = document.getElementById('httpModalOverlay');
  const body = document.getElementById('httpModalBody');
  const title = document.getElementById('httpModalTitle');

  title.textContent = `HTTP 请求 — ${truncate(msgText, 40)}`;
  body.innerHTML = '<div class="placeholder"><div class="spinner"></div></div>';
  overlay.classList.remove('hidden');

  try {
    const resp = await fetch(`${apiBase()}/api/message-http/${sessionId}/${messageId}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    showHttpModal(data.records || []);
  } catch (e) {
    body.innerHTML = `<div class="error-msg" style="padding:20px">${escHtml(e.message)}</div>`;
  }
}

function _makeCollapsibleSection(label, content, collapsed) {
  const sec = document.createElement('div');
  sec.className = 'http-record-section';

  const labelEl = document.createElement('div');
  labelEl.className = 'http-record-label';
  labelEl.style.cursor = 'pointer';
  labelEl.style.userSelect = 'none';
  labelEl.innerHTML = `${label} <span style="color:var(--accent);font-size:10px">[${collapsed ? '展开' : '收起'}]</span>`;
  sec.appendChild(labelEl);

  const contentEl = document.createElement('div');
  contentEl.className = 'http-record-content';
  if (collapsed) contentEl.style.display = 'none';
  contentEl.textContent = content;
  sec.appendChild(contentEl);

  labelEl.onclick = () => {
    const hidden = contentEl.style.display === 'none';
    contentEl.style.display = hidden ? '' : 'none';
    labelEl.querySelector('span').textContent = hidden ? '[收起]' : '[展开]';
  };
  return sec;
}

function showHttpModal(records) {
  const body = document.getElementById('httpModalBody');
  if (records.length === 0) {
    body.innerHTML = '<div class="no-records">未找到对应的 HTTP 请求记录</div>';
    return;
  }

  body.innerHTML = '';
  for (const rec of records) {
    const card = document.createElement('div');
    card.className = 'http-record';

    const model = rec.request_json?.model || '—';
    const msgId = rec.response_json?.message?.id || '';
    const header = document.createElement('div');
    header.className = 'http-record-header';
    header.innerHTML =
      `<span class="http-record-ts">${escHtml(rec.timestamp || '')}</span>` +
      `<span class="http-record-model">${escHtml(model)}</span>` +
      (msgId ? `<span style="color:var(--text-secondary);font-size:11px">${escHtml(msgId)}</span>` : '');
    card.appendChild(header);

    const usage = rec.response_json?.message?.usage;
    if (usage) {
      const sec = document.createElement('div');
      sec.className = 'http-record-section';
      sec.innerHTML = `<div class="http-record-label">Token 用量</div>` +
        `<div class="usage-chips">` +
        `<div class="usage-chip">input <span>${(usage.input_tokens || 0).toLocaleString()}</span></div>` +
        `<div class="usage-chip">output <span>${(usage.output_tokens || 0).toLocaleString()}</span></div>` +
        `<div class="usage-chip">cache_read <span>${(usage.cache_read_input_tokens || 0).toLocaleString()}</span></div>` +
        `<div class="usage-chip">cache_create <span>${(usage.cache_creation_input_tokens || 0).toLocaleString()}</span></div>` +
        `</div>`;
      card.appendChild(sec);
    }

    const contentText = rec.response_json?.message?.content?.text;
    if (contentText) {
      card.appendChild(_makeCollapsibleSection('助手回复', contentText, false));
    }

    const reqCopy = Object.assign({}, rec.request_json);
    const msgCount = reqCopy.messages?.length || 0;
    reqCopy.messages = `[${msgCount} messages — expand raw to see all]`;
    const reqSummary = JSON.stringify(reqCopy, null, 2);
    card.appendChild(_makeCollapsibleSection(`请求 (request_json, ${msgCount} messages)`, reqSummary, true));
    card.appendChild(_makeCollapsibleSection('完整请求 (含所有 messages)', JSON.stringify(rec.request_json, null, 2), true));
    card.appendChild(_makeCollapsibleSection('原始响应 (response_json)', JSON.stringify(rec.response_json, null, 2), true));

    body.appendChild(card);
  }
}

function closeHttpModal(event) {
  if (event && event.target !== document.getElementById('httpModalOverlay')) return;
  document.getElementById('httpModalOverlay').classList.add('hidden');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeHttpModal(); closeExportModal(); }
});

// ── Export ─────────────────────────────────────────────────────────────────
function fmtExportFilename() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `export-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.tar.gz`;
}

function openExportModal() {
  const sessionId = document.getElementById('sessionSel').value;
  if (!sessionId) return;
  document.getElementById('exportSessionId').textContent = sessionId;
  document.getElementById('exportFilename').value = fmtExportFilename();
  document.getElementById('exportStatus').textContent = '';
  const btn = document.getElementById('exportConfirmBtn');
  btn.disabled = false;
  btn.textContent = '选择位置并导出';
  btn.onclick = doExport;
  document.getElementById('exportOverlay').classList.add('open');
}

function closeExportModal() {
  const el = document.getElementById('exportOverlay');
  if (el) el.classList.remove('open');
}

function onExportOverlayClick(e) {
  if (e.target === document.getElementById('exportOverlay')) closeExportModal();
}

async function doExport() {
  const sessionId = document.getElementById('exportSessionId').textContent.trim();
  const filename = (document.getElementById('exportFilename').value.trim() || fmtExportFilename())
    .replace(/[/\\:*?"<>|]/g, '_');
  const confirmBtn = document.getElementById('exportConfirmBtn');
  const statusEl = document.getElementById('exportStatus');

  statusEl.textContent = '';
  statusEl.style.color = 'var(--text-secondary)';

  try {
    let dirHandle = null;
    if (window.showDirectoryPicker) {
      dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    }

    confirmBtn.disabled = true;
    confirmBtn.textContent = '生成中…';
    confirmBtn.onclick = null;

    const url = `${apiBase()}/api/export?sessions=${encodeURIComponent(sessionId)}&filename=${encodeURIComponent(filename)}`;
    const resp = await fetch(url);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const blob = await resp.blob();

    if (dirHandle) {
      const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    }

    statusEl.style.color = 'var(--success)';
    statusEl.textContent = `✓ 已导出：${filename}`;
    confirmBtn.textContent = '完成';
    confirmBtn.disabled = false;
    confirmBtn.onclick = closeExportModal;

  } catch (e) {
    if (e.name === 'AbortError') {
      statusEl.textContent = '';
    } else {
      statusEl.style.color = 'var(--danger)';
      statusEl.textContent = `导出失败：${e.message}`;
    }
    confirmBtn.textContent = '选择位置并导出';
    confirmBtn.disabled = false;
    confirmBtn.onclick = doExport;
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
fetchProjects();
</script>
</body>
</html>
